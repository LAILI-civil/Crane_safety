        function fitCanvas(canvas) {
            const rect = canvas.getBoundingClientRect();
            let w = rect.width,
                h = rect.height;
            if (w === 0 || h === 0) {
                const parent = canvas.parentElement;
                if (parent) {
                    const parentRect = parent.getBoundingClientRect();
                    w = parentRect.width || 300;
                    h = parentRect.height || 200;
                } else {
                    w = 300;
                    h = 200;
                }
            }
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.max(1, Math.floor(w * dpr));
            canvas.height = Math.max(1, Math.floor(h * dpr));
            const ctx = canvas.getContext("2d");
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            return { ctx, width: w, height: h };
        }

        function makeWorldMapper(points, width, height, padding = 28) {
            let minX = Infinity,
                maxX = -Infinity,
                minY = Infinity,
                maxY = -Infinity;
            points.forEach(p => {
                minX = Math.min(minX, p[0]);
                maxX = Math.max(maxX, p[0]);
                minY = Math.min(minY, p[1]);
                maxY = Math.max(maxY, p[1]);
            });
            const spanX = Math.max(1e-6, maxX - minX);
            const spanY = Math.max(1e-6, maxY - minY);
            const scale = Math.min((width - 2 * padding) / spanX, (height - 2 * padding) / spanY);
            const cx = 0.5 * (minX + maxX);
            const cy = 0.5 * (minY + maxY);
            return function map(p) {
                return [width / 2 + (p[0] - cx) * scale, height / 2 - (p[1] - cy) * scale];
            };
        }

        // 3D 绘图（省略细节，保留原实现）
        function drawRisk3D(demo) {
            const canvas = document.getElementById("risk3DCanvas");
            if (!canvas) return;

            const { ctx, width, height } = fitCanvas(canvas);
            ctx.clearRect(0, 0, width, height);

            // 基础点位
            const O = [0, 0, 0];
            const A = [demo.liftGround[0], demo.liftGround[1], 0];
            const B = [demo.dropGround[0], demo.dropGround[1], 0];
            const P0 = [demo.workerStartGround[0], demo.workerStartGround[1], 0];
            const P1 = [demo.workerEndGround[0], demo.workerEndGround[1], 0];
            const boomHeight = 10;
            const towerHeight = 12;
            const towerTop = [0, 0, towerHeight];
            const sweep = demo.sweep;
            const startAng = Math.atan2(demo.liftGround[1], demo.liftGround[0]);
            const sigma = sweep.sigma;
            const Delta = sweep.Delta;
            const midR = 0.5 * (sweep.rA + sweep.rB);
            const boomDisplayLen = Math.min(14, Math.max(10, midR + 3));
            const boomStartEnd = [
                boomDisplayLen * Math.cos(startAng),
                boomDisplayLen * Math.sin(startAng),
                boomHeight
            ];
            const boomFinalEnd = [
                boomDisplayLen * Math.cos(startAng + sigma * Delta),
                boomDisplayLen * Math.sin(startAng + sigma * Delta),
                boomHeight
            ];

            // 吊钩轨迹
            const hookTrackTop = [];
            const hookTrackGround = [];
            const hookSteps = 60;
            for (let i = 0; i <= hookSteps; i++) {
                const t = i / hookSteps;
                const ang = startAng + sigma * Delta * t;
                const x = midR * Math.cos(ang);
                const y = midR * Math.sin(ang);
                hookTrackTop.push([x, y, boomHeight]);
                hookTrackGround.push([x, y, 0]);
            }
            const hookStartTop = hookTrackTop[0];
            const hookStartGround = hookTrackGround[0];

            const hookDropLines = [];
            const hookDropCount = 5;
            for (let i = 0; i < hookDropCount; i++) {
                const t = hookDropCount === 1 ? 0 : i / (hookDropCount - 1);
                const ang = startAng + sigma * Delta * t;
                const x = midR * Math.cos(ang);
                const y = midR * Math.sin(ang);
                hookDropLines.push({
                    top: [x, y, boomHeight],
                    bottom: [x, y, 0]
                });
            }

            // 计算范围
            const allPoints = [
                O, towerTop, boomStartEnd, boomFinalEnd, P0, P1, A, B,
                ...hookTrackTop, ...hookTrackGround,
                ...hookDropLines.flatMap(h => [h.top, h.bottom])
            ];
            let minX = Infinity,
                maxX = -Infinity,
                minY = Infinity,
                maxY = -Infinity,
                minZ = Infinity,
                maxZ = -Infinity;
            allPoints.forEach(p => {
                minX = Math.min(minX, p[0]);
                maxX = Math.max(maxX, p[0]);
                minY = Math.min(minY, p[1]);
                maxY = Math.max(maxY, p[1]);
                minZ = Math.min(minZ, p[2]);
                maxZ = Math.max(maxZ, p[2]);
            });
            const pad = 2.0;
            minX -= pad;
            maxX += pad;
            minY -= pad;
            maxY += pad;
            minZ = Math.min(0, minZ);
            maxZ += pad;
            const spanX = maxX - minX || 1;
            const spanY = maxY - minY || 1;
            const spanZ = maxZ - minZ || 1;
            const projY = 0.55;
            const projZ = 0.48;
            const scale = Math.min(width / (spanX + projY * spanY), height / (projZ * spanY + spanZ)) * 0.86;
            const cx = 0.5 * (minX + maxX);
            const cy = 0.5 * (minY + maxY);
            const cz = 0.5 * (minZ + maxZ);

            function project3D(p) {
                const x = p[0] - cx;
                const y = p[1] - cy;
                const z = p[2] - cz;
                return [width / 2 + scale * (x - projY * y), height / 2 - scale * (projZ * y + z)];
            }

            function line(p, q, color, lw = 2, dash = null) {
                const a = project3D(p);
                const b = project3D(q);
                ctx.save();
                if (dash) ctx.setLineDash(dash);
                else ctx.setLineDash([]);
                ctx.beginPath();
                ctx.moveTo(a[0], a[1]);
                ctx.lineTo(b[0], b[1]);
                ctx.strokeStyle = color;
                ctx.lineWidth = lw;
                ctx.lineCap = "round";
                ctx.stroke();
                ctx.restore();
            }

            function polyline(points, color, lw = 1.5, dash = null) {
                if (!points || points.length < 2) return;
                ctx.save();
                if (dash) ctx.setLineDash(dash);
                else ctx.setLineDash([]);
                const first = project3D(points[0]);
                ctx.beginPath();
                ctx.moveTo(first[0], first[1]);
                for (let i = 1; i < points.length; i++) {
                    const p = project3D(points[i]);
                    ctx.lineTo(p[0], p[1]);
                }
                ctx.strokeStyle = color;
                ctx.lineWidth = lw;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.stroke();
                ctx.restore();
            }

            function point(p, color, r = 4, stroke = true) {
                const a = project3D(p);
                ctx.beginPath();
                ctx.arc(a[0], a[1], r, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                ctx.fill();
                if (stroke) {
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }

            function textCenter(p, txt, color = "#334155", offsetY = -10) {
                const a = project3D(p);
                ctx.save();
                ctx.font = "bold 12px Times New Roman";
                ctx.textAlign = "center";
                ctx.textBaseline = "bottom";
                ctx.fillStyle = color;
                ctx.strokeStyle = "rgba(255,255,255,0.9)";
                ctx.lineWidth = 3;
                ctx.strokeText(txt, a[0], a[1] + offsetY);
                ctx.fillText(txt, a[0], a[1] + offsetY);
                ctx.restore();
            }

            // 绘制背景、网格、塔身、塔臂、吊钩轨迹、worker轨迹等
            ctx.fillStyle = "#f8fafc";
            ctx.fillRect(0, 0, width, height);

            const gridMin = -4,
                gridMax = 16,
                gridStep = 4;
            for (let g = gridMin; g <= gridMax; g += gridStep) {
                line([g, gridMin, 0], [g, gridMax, 0], "rgba(148,163,184,0.25)", 1);
                line([gridMin, g, 0], [gridMax, g, 0], "rgba(148,163,184,0.25)", 1);
            }

            line(O, towerTop, "#111827", 4);
            const towerHalf = 0.35;
            const towerBaseCorners = [
                [-towerHalf, -towerHalf, 0],
                [towerHalf, -towerHalf, 0],
                [towerHalf, towerHalf, 0],
                [-towerHalf, towerHalf, 0]
            ];
            const towerTopCorners = [
                [-towerHalf, -towerHalf, towerHeight],
                [towerHalf, -towerHalf, towerHeight],
                [towerHalf, towerHalf, towerHeight],
                [-towerHalf, towerHalf, towerHeight]
            ];
            for (let i = 0; i < 4; i++) {
                const j = (i + 1) % 4;
                line(towerBaseCorners[i], towerTopCorners[i], "#111827", 2);
                line(towerBaseCorners[i], towerBaseCorners[j], "#111827", 1.5);
                line(towerTopCorners[i], towerTopCorners[j], "#111827", 1.5);
            }
            for (let k = 0; k < 4; k++) {
                const z0 = (towerHeight / 4) * k;
                const z1 = (towerHeight / 4) * (k + 1);
                line([-towerHalf, -towerHalf, z0], [towerHalf, towerHalf, z1], "rgba(17,24,39,0.75)", 1);
                line([towerHalf, -towerHalf, z0], [-towerHalf, towerHalf, z1], "rgba(17,24,39,0.75)", 1);
            }
            textCenter([0, 0, towerHeight + 0.5], "Tower", "#111827", -2);

            line([0, 0, boomHeight], boomStartEnd, "#facc15", 4);
            line([0, 0, boomHeight], boomFinalEnd, "#f59e0b", 4);
            line([0, 0, boomHeight + 0.25], [boomStartEnd[0], boomStartEnd[1], boomStartEnd[2] + 0.25], "rgba(250,204,21,0.65)", 1.5);
            line([0, 0, boomHeight + 0.25], [boomFinalEnd[0], boomFinalEnd[1], boomFinalEnd[2] + 0.25], "rgba(245,158,11,0.65)", 1.5);

            hookDropLines.forEach((h, idx) => {
                const isMiddle = idx === Math.floor(hookDropLines.length / 2);
                line(h.top, h.bottom, isMiddle ? "rgba(37,99,235,0.55)" : "rgba(37,99,235,0.32)", isMiddle ? 1.3 : 1.0, [4, 5]);
            });
            polyline(hookTrackTop, "rgba(37,99,235,0.85)", 1.5);
            polyline(hookTrackGround, "rgba(37,99,235,0.45)", 1.3);
            point(hookStartTop, "#2563eb", 3.5);
            point(hookStartGround, "rgba(37,99,235,0.55)", 2.5, false);

            line(P0, P1, "#16a34a", 1.6);
            point(P0, "#86efac", 2.8);
            point(P1, "#16a34a", 3.5);
            point(O, "#111827", 3);
        }

        // 俯视图辅助函数
        function drawArrowLineOnTop(ctx, map, p, q, color = "#16a34a", lw = 4) {
            const a = map(p);
            const b = map(q);
            const dx = b[0] - a[0];
            const dy = b[1] - a[1];
            const len = Math.hypot(dx, dy);
            if (len < 1e-6) return;
            const ux = dx / len,
                uy = dy / len;
            ctx.beginPath();
            ctx.moveTo(a[0], a[1]);
            ctx.lineTo(b[0], b[1]);
            ctx.strokeStyle = color;
            ctx.lineWidth = lw;
            ctx.lineCap = "round";
            ctx.stroke();
            const arrowLen = 5,
                arrowWidth = 3;
            ctx.beginPath();
            ctx.moveTo(b[0], b[1]);
            ctx.lineTo(b[0] - arrowLen * ux - arrowWidth * uy, b[1] - arrowLen * uy + arrowWidth * ux);
            ctx.lineTo(b[0] - arrowLen * ux + arrowWidth * uy, b[1] - arrowLen * uy - arrowWidth * ux);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawPolylineArrowOnTop(ctx, map, points, color = "#f97316", lw = 3) {
            if (!points || points.length < 2) return;
            ctx.beginPath();
            const first = map(points[0]);
            ctx.moveTo(first[0], first[1]);
            for (let i = 1; i < points.length; i++) {
                const p = map(points[i]);
                ctx.lineTo(p[0], p[1]);
            }
            ctx.strokeStyle = color;
            ctx.lineWidth = lw;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.stroke();

            const p1 = map(points[points.length - 2]);
            const p2 = map(points[points.length - 1]);
            const dx = p2[0] - p1[0];
            const dy = p2[1] - p1[1];
            const len = Math.hypot(dx, dy);
            if (len < 1e-6) return;
            const ux = dx / len,
                uy = dy / len;
            const arrowLen = 5,
                arrowWidth = 3;
            ctx.beginPath();
            ctx.moveTo(p2[0], p2[1]);
            ctx.lineTo(p2[0] - arrowLen * ux - arrowWidth * uy, p2[1] - arrowLen * uy + arrowWidth * ux);
            ctx.lineTo(p2[0] - arrowLen * ux + arrowWidth * uy, p2[1] - arrowLen * uy - arrowWidth * ux);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawAngleMarkOnTop(ctx, map, center, radius, startAng, sigma, arcDelta, text, labelRadius = null, labelDelta = null) {
            const steps = 40;
            const arcPts = [];
            if (arcDelta > 1e-4) {
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    const ang = startAng + sigma * arcDelta * t;
                    arcPts.push([center[0] + radius * Math.cos(ang), center[1] + radius * Math.sin(ang)]);
                }
                drawPolylineArrowOnTop(ctx, map, arcPts, "#f97316", 2.0);
            }
            const textDelta = labelDelta !== null ? labelDelta : arcDelta;
            const midAng = startAng + sigma * textDelta * 0.5;
            const textRadius = labelRadius !== null ? labelRadius : radius * 0.5;
            const labelPos = [center[0] + textRadius * Math.cos(midAng), center[1] + textRadius * Math.sin(midAng)];
            const lp = map(labelPos);
            ctx.save();
            ctx.font = "bold 14px Times New Roman";
            ctx.fillStyle = "#ea580c";
            ctx.strokeStyle = "rgba(255,255,255,0.9)";
            ctx.lineWidth = 4;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.strokeText(text, lp[0], lp[1]);
            ctx.fillText(text, lp[0], lp[1]);
            ctx.restore();
        }

        function drawRiskTopView(demo, progress = 1) {
            const canvas = document.getElementById("riskTopCanvas");
            if (!canvas) return;

            const { ctx, width, height } = fitCanvas(canvas);
            ctx.clearRect(0, 0, width, height);
            progress = Math.max(0, Math.min(1, progress));

            const O = [0, 0];
            const A = demo.liftGround;
            const B = demo.dropGround;
            const P0 = demo.workerStartGround;
            const P1 = demo.workerEndGround;
            const boomLength = demo.boomLength;
            const loadRadius = demo.loadRadius;
            const sweep = demo.sweep;
            const steps = 80;
            const startAng = Math.atan2(A[1], A[0]);
            const sigma = sweep.sigma;
            const Delta = sweep.Delta;
            const midR = 0.5 * (sweep.rA + sweep.rB);
            const workerNow = [
                P0[0] + progress * (P1[0] - P0[0]),
                P0[1] + progress * (P1[1] - P0[1])
            ];

            const fanPoints = [];
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const ang = startAng + sigma * Delta * t;
                fanPoints.push([boomLength * Math.cos(ang), boomLength * Math.sin(ang)]);
            }
            const currentSteps = Math.max(2, Math.floor(steps * progress));
            const currentFanPoints = [];
            for (let i = 0; i <= currentSteps; i++) {
                const t = progress * i / currentSteps;
                const ang = startAng + sigma * Delta * t;
                currentFanPoints.push([boomLength * Math.cos(ang), boomLength * Math.sin(ang)]);
            }

            const loadTrackPoints = [];
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const ang = startAng + sigma * Delta * t;
                loadTrackPoints.push([midR * Math.cos(ang), midR * Math.sin(ang)]);
            }
            const currentLoadTrackPoints = [];
            for (let i = 0; i <= currentSteps; i++) {
                const t = progress * i / currentSteps;
                const ang = startAng + sigma * Delta * t;
                currentLoadTrackPoints.push([midR * Math.cos(ang), midR * Math.sin(ang)]);
            }

            const allPoints = [
                O, P0, P1, workerNow, [-2, -2], [14, 14],
                ...fanPoints, ...loadTrackPoints
            ];
            const map = makeWorldMapper(allPoints, width, height, 24);

            function drawPoint(p, color, r = 2, stroke = true) {
                const a = map(p);
                ctx.beginPath();
                ctx.arc(a[0], a[1], r, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                ctx.fill();
                if (stroke) {
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }

            ctx.fillStyle = "#f8fafc";
            ctx.fillRect(0, 0, width, height);

            // 全扇形
            ctx.beginPath();
            let center = map(O);
            ctx.moveTo(center[0], center[1]);
            for (let i = 0; i < fanPoints.length; i++) {
                const q = map(fanPoints[i]);
                ctx.lineTo(q[0], q[1]);
            }
            ctx.closePath();
            ctx.fillStyle = "rgba(249,115,22,0.12)";
            ctx.fill();

            // 当前进度扇形
            ctx.beginPath();
            center = map(O);
            ctx.moveTo(center[0], center[1]);
            for (let i = 0; i < currentFanPoints.length; i++) {
                const q = map(currentFanPoints[i]);
                ctx.lineTo(q[0], q[1]);
            }
            ctx.closePath();
            ctx.fillStyle = "rgba(249,115,22,0.32)";
            ctx.fill();

            // 吊物轨迹（背景）
            ctx.beginPath();
            for (let i = 0; i < loadTrackPoints.length; i++) {
                const q = map(loadTrackPoints[i]);
                if (i === 0) ctx.moveTo(q[0], q[1]);
                else ctx.lineTo(q[0], q[1]);
            }
            const pRef1 = map([0, 0]);
            const pRef2 = map([loadRadius, 0]);
            const pixelLoadRadius = Math.abs(pRef2[0] - pRef1[0]);
            ctx.strokeStyle = "rgba(59,130,246,0.20)";
            ctx.lineWidth = Math.max(5, 2 * pixelLoadRadius);
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.stroke();

            // 当前吊物轨迹
            ctx.beginPath();
            for (let i = 0; i < currentLoadTrackPoints.length; i++) {
                const q = map(currentLoadTrackPoints[i]);
                if (i === 0) ctx.moveTo(q[0], q[1]);
                else ctx.lineTo(q[0], q[1]);
            }
            ctx.strokeStyle = "rgba(59,130,246,0.48)";
            ctx.lineWidth = Math.max(5, 2 * pixelLoadRadius);
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.stroke();

            // 角度标注
            const angleArrowR = boomLength * 0.99;
            const angleTextR = boomLength * 0.48;
            drawAngleMarkOnTop(ctx, map, O, angleArrowR, startAng, sigma, Delta * progress,
                `${sweep.DeltaDeg.toFixed(1)}°`, angleTextR, Delta);

            // 工人轨迹
            drawArrowLineOnTop(ctx, map, P0, P1, "rgba(22,163,74,0.28)", 2);
            if (progress > 0.02) {
                drawArrowLineOnTop(ctx, map, P0, workerNow, "#16a34a", 2);
            }
            drawPoint(workerNow, "#16a34a", 3);
        }

        let riskTopAnimId = null;

        function updateRiskDrawArea(Pmat) {
            const demo = buildRiskDemoFromP(Pmat);
            updateRiskParamPanel(demo);
            drawRisk3D(demo);

            if (riskTopAnimId !== null) {
                cancelAnimationFrame(riskTopAnimId);
                riskTopAnimId = null;
            }

            const duration = 5000;
            let startTime = null;
            function animateRiskTop(timestamp) {
                if (startTime === null) startTime = timestamp;
                let progress = (timestamp - startTime) / duration;
                if (progress > 1) {
                    startTime = timestamp;
                    progress = 0;
                }
                drawRiskTopView(demo, progress);
                riskTopAnimId = requestAnimationFrame(animateRiskTop);
            }
            riskTopAnimId = requestAnimationFrame(animateRiskTop);
        }

        function renderMatrix(matrix) {
            const grid = document.getElementById('matrixGrid');
            if (!grid) return;
            grid.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 4; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.textContent = matrix[i][j].toFixed(4);
                    grid.appendChild(cell);
                }
            }
        }

        // ================================================================
        // 5. 主计算流程
        // ================================================================
        function calibrateCamera() {
            try {
                document.getElementById('calibStatus').innerHTML = '';
                const grid = document.getElementById('matrixGrid');
                if (grid) grid.innerHTML = '<div style="grid-column:span 4; text-align:center; color:#94a3b8; padding:8px;">计算中...</div>';

                const baseRadius = parseFloat(document.getElementById('baseRadius').value);
                if (isNaN(baseRadius) || baseRadius <= 0) throw new Error("底座距离必须为正数");

                const imageMarks = {
                    B1: [parseFloat(document.getElementById('b1u').value), parseFloat(document.getElementById('b1v').value)],
                    B2: [parseFloat(document.getElementById('b2u').value), parseFloat(document.getElementById('b2v').value)],
                    B3: [parseFloat(document.getElementById('b3u').value), parseFloat(document.getElementById('b3v').value)],
                    B4: [parseFloat(document.getElementById('b4u').value), parseFloat(document.getElementById('b4v').value)],
                    C: null
                };
                const cu = document.getElementById('cu').value,
                    cv = document.getElementById('cv').value;
                if (cu && cv) {
                    imageMarks.C = [parseFloat(cu), parseFloat(cv)];
                }
                for (let key of ['B1', 'B2', 'B3', 'B4', 'C']) {
                    if (imageMarks[key] !== null && (isNaN(imageMarks[key][0]) || isNaN(imageMarks[key][1]))) {
                        imageMarks[key] = null;
                    }
                }

                const useCenter = true;
                const blendWeight = 0.7;
                const { H0, completed, estimatedInfo } = calibrateGroundHomography(
                    imageMarks, baseRadius, useCenter, blendWeight
                );

                let infoMsg = "";
                if (estimatedInfo.estimatedLabels.length > 0) {
                    infoMsg = `⚠️ 底座点补全: ${estimatedInfo.estimatedLabels.join(', ')} (方法: ${estimatedInfo.method})`;
                    if (estimatedInfo.warning) infoMsg += ` ${estimatedInfo.warning}`;
                }

                const vrows = document.querySelectorAll('.vpoint-row');
                let verticalPts = [];
                vrows.forEach(row => {
                    let Z = parseFloat(row.querySelector('.vz').value);
                    let u = parseFloat(row.querySelector('.vu').value);
                    let v = parseFloat(row.querySelector('.vv').value);
                    if (!isNaN(Z) && !isNaN(u) && !isNaN(v)) verticalPts.push([Z, u, v]);
                });
                if (verticalPts.length < 2) throw new Error("至少需要2个垂直参考点");

                const p3 = estimateP3(H0, verticalPts);

                const trolleyHeight = parseFloat(document.getElementById('trolleyHeight').value);
                const trolleyPixel = [parseFloat(document.getElementById('trolleyU').value), parseFloat(document.getElementById('trolleyV').value)];
                const hookPixel = [parseFloat(document.getElementById('hookU').value), parseFloat(document.getElementById('hookV').value)];

                const [X, Y] = imageToXYAtHeight(H0, p3, trolleyPixel, trolleyHeight);
                const Z_hook = estimateHeight(H0, p3, X, Y, hookPixel);
                const groundPixel = groundToImage(H0, X, Y);
                const trolleyRadius = Math.hypot(X, Y);
                const theta_deg = Math.atan2(Y, X) * 180 / Math.PI;

                const [p1, p2, p4] = splitH0(H0);
                const Pmat = [
                    [p1[0], p2[0], p3[0], p4[0]],
                    [p1[1], p2[1], p3[1], p4[1]],
                    [p1[2], p2[2], p3[2], p4[2]]
                ];

                updateRiskDrawArea(Pmat);
                window.lastPmat = Pmat;
                renderMatrix(Pmat);

                let statusHtml = `
                        <div class="success-info">
                            ✅ 标定成功<br>
                            📍 地面投影点 (像素): (${groundPixel[0].toFixed(3)}, ${groundPixel[1].toFixed(3)})<br>
                            🏗️ 吊物空间点: (${X.toFixed(3)}, ${Y.toFixed(3)}, ${Z_hook.toFixed(3)})(m)<br>
                            📏 小车半径: ${trolleyRadius.toFixed(3)} m, 角度: ${theta_deg.toFixed(3)}°
                    `;
                if (infoMsg) {
                    statusHtml += `<br>📌 ${infoMsg}`;
                }
                statusHtml += `</div>`;
                document.getElementById('calibStatus').innerHTML = statusHtml;

            } catch (err) {
                document.getElementById('calibStatus').innerHTML =
                    `<div class="error-msg">❌ 标定失败: ${err.message}</div>`;
                const grid = document.getElementById('matrixGrid');
                if (grid) grid.innerHTML = '<div style="grid-column:span 4; text-align:center; color:#dc2626; padding:8px;">计算失败</div>';
            }
        }

        // ================================================================
        // 6. 视频交互选取
        // ================================================================
        let activePickMode = null,
            pickCallback = null;
        const video = document.getElementById('mainVideo');

        function getVideoOriginalCoordinates(event) {
            const rect = video.getBoundingClientRect();
            const scaleX = video.videoWidth / rect.width;
            const scaleY = video.videoHeight / rect.height;
            let u = (event.clientX - rect.left) * scaleX;
            let v = (event.clientY - rect.top) * scaleY;
            u = Math.min(Math.max(0, u), video.videoWidth);
            v = Math.min(Math.max(0, v), video.videoHeight);
            return { u, v };
        }

        function enterPickMode(targetId, callback) {
            if (activePickMode) video.style.cursor = "default";
            activePickMode = targetId;
            video.style.cursor = "crosshair";
            document.getElementById('pickTip').innerHTML = `✏️ 正在选取: ${targetId}`;
            pickCallback = callback;
        }

        function onVideoClick(event) {
            if (!activePickMode) return;
            const { u, v } = getVideoOriginalCoordinates(event);
            if (pickCallback) pickCallback(activePickMode, u, v);
            video.style.cursor = "default";
            activePickMode = null;
            document.getElementById('pickTip').innerHTML = '✅ 坐标已选取';
            setTimeout(() => {
                if (!activePickMode) document.getElementById('pickTip').innerHTML =
                    '✏️ 点击「选取」按钮，再点击视频获取坐标';
            }, 1500);
        }
        video.addEventListener('click', onVideoClick);

        function bindPickButtons() {
            const mappings = [
                { id: 'b1', uId: 'b1u', vId: 'b1v' }, { id: 'b2', uId: 'b2u', vId: 'b2v' },
                { id: 'b3', uId: 'b3u', vId: 'b3v' }, { id: 'b4', uId: 'b4u', vId: 'b4v' },
                { id: 'c', uId: 'cu', vId: 'cv' }, { id: 'trolley', uId: 'trolleyU', vId: 'trolleyV' },
                { id: 'hook', uId: 'hookU', vId: 'hookV' }
            ];
            mappings.forEach(m => {
                const btn = document.querySelector(`button.pick-btn[data-target="${m.id}"]`);
                if (btn) {
                    btn.addEventListener('click', () => {
                        enterPickMode(m.id, (mode, u, v) => {
                            document.getElementById(m.uId).value = u.toFixed(3);
                            document.getElementById(m.vId).value = v.toFixed(3);
                        });
                    });
                }
            });
        }

        function handleVerticalPick(e) {
            const btn = e.currentTarget;
            const row = btn.closest('.vpoint-row');
            const idx = row.getAttribute('data-idx');
            enterPickMode(`vertical_${idx}`, (mode, u, v) => {
                row.querySelector('.vu').value = u.toFixed(3);
                row.querySelector('.vv').value = v.toFixed(3);
            });
        }

        function addVerticalPoint() {
            const container = document.getElementById('verticalPointsContainer');
            const idx = container.children.length;
            const newRow = document.createElement('div');
            newRow.className = 'vpoint-row';
            newRow.setAttribute('data-idx', idx);
            newRow.innerHTML = `
                    <div class="field"><label>Z${idx+1} (m)</label><input class="vz" type="number" value="15.00"></div>
                    <div class="field"><label>u</label><input class="vu" type="number" value="770.000"></div>
                    <div class="field"><label>v</label><input class="vv" type="number" value="120.000"></div>
                    <button class="pick-btn pick-vertical" data-idx="${idx}">选取</button>
                `;
            container.appendChild(newRow);
            newRow.querySelector('.pick-vertical').addEventListener('click', handleVerticalPick);
        }

        window.addEventListener('DOMContentLoaded', () => {
            bindPickButtons();
            document.getElementById('addVerticalPoint').addEventListener('click', addVerticalPoint);
            document.getElementById('calibrateBtn').addEventListener('click', calibrateCamera);
            video.muted = true;
            video.play().catch(() => {});
            document.querySelectorAll('.pick-vertical').forEach(btn => btn.addEventListener('click', handleVerticalPick));

            const observer = new MutationObserver(() => {
                document.querySelectorAll('.pick-vertical').forEach(btn => {
                    btn.removeEventListener('click', handleVerticalPick);
                    btn.addEventListener('click', handleVerticalPick);
                });
            });
            observer.observe(document.getElementById('verticalPointsContainer'), { childList: true, subtree: true });

            window.addEventListener("resize", () => {
                if (window.lastPmat) renderMatrix(window.lastPmat);
            });
        });
    </script>
</body>
