<script>
    // ================================================================
    // 1. 基础数学工具 (与 Python 一致)
    // ================================================================

    // 最小二乘求解 (自动处理行列数)
    function leastSquares(A, b) {
        const rows = A.length, cols = A[0].length;
        let U, S, V;
        if (rows >= cols) {
            const svd = numeric.svd(A);
            U = svd.U; S = svd.S; V = svd.V;
        } else {
            const AT = numeric.transpose(A);
            const svd = numeric.svd(AT);
            U = svd.V; S = svd.S; V = svd.U;
        }
        const tol = 1e-12 * S[0];
        const x = new Array(cols).fill(0);
        for (let i = 0; i < S.length; i++) {
            if (S[i] > tol) {
                const invS = 1.0 / S[i];
                const ui = U.map(row => row[i]);
                const coeff = invS * numeric.dot(ui, b);
                for (let j = 0; j < cols; j++) {
                    x[j] += V[j][i] * coeff;
                }
            }
        }
        return x;
    }

    // 二维点归一化
    function normalizePoints(points) {
        const n = points.length;
        let meanX = 0, meanY = 0;
        for (let i = 0; i < n; i++) { meanX += points[i][0]; meanY += points[i][1]; }
        meanX /= n; meanY /= n;
        const centered = points.map(p => [p[0]-meanX, p[1]-meanY]);
        let sumDist = 0;
        for (let i = 0; i < n; i++) sumDist += Math.hypot(centered[i][0], centered[i][1]);
        const meanDist = sumDist / n;
        const scale = Math.sqrt(2) / meanDist;
        const T = [
            [scale, 0, -scale * meanX],
            [0, scale, -scale * meanY],
            [0, 0, 1]
        ];
        const normPoints = points.map(p => {
            const ph = [p[0], p[1], 1];
            const res = numeric.dot(T, ph);
            return [res[0]/res[2], res[1]/res[2]];
        });
        return { normPoints, T };
    }

    // 计算单应矩阵 H (DLT) —— 修正：稳健处理行<列情况
    function computeHomography(worldPts, imgPts) {
        if (worldPts.length < 4) throw new Error("至少需要4对点");
        const { normPoints: worldNorm, T: Tw } = normalizePoints(worldPts);
        const { normPoints: imgNorm, T: Ti } = normalizePoints(imgPts);
        const A = [];
        for (let i = 0; i < worldNorm.length; i++) {
            const X = worldNorm[i][0], Y = worldNorm[i][1];
            const u = imgNorm[i][0], v = imgNorm[i][1];
            A.push([X, Y, 1, 0, 0, 0, -u*X, -u*Y, -u]);
            A.push([0, 0, 0, X, Y, 1, -v*X, -v*Y, -v]);
        }
        // 稳健 SVD：处理行<列的情况
        const AT = numeric.transpose(A);
        const ATA = numeric.dot(AT, A);

        const eig = numeric.eig(ATA);
        const eigenValues = eig.lambda.x;
        const eigenVectors = eig.E.x;

        // 找最小特征值对应的特征向量
        let minIdx = 0;
        let minVal = Math.abs(eigenValues[0]);

        for (let i = 1; i < eigenValues.length; i++) {
            const val = Math.abs(eigenValues[i]);
            if (val < minVal) {
                minVal = val;
                minIdx = i;
            }
        }

        // numeric.eig 返回的 eigenVectors 是按列存储特征向量
        const h = eigenVectors.map(row => row[minIdx]);
        const Hn = [
            [h[0], h[1], h[2]],
            [h[3], h[4], h[5]],
            [h[6], h[7], h[8]]
        ];
        const TiInv = numeric.inv(Ti);
        let H = numeric.dot(numeric.dot(TiInv, Hn), Tw);

        // 归一化：强制除以 H[2][2]（若不为零），否则除以范数
        const scale = H[2][2];
        if (Math.abs(scale) > 1e-12) {
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    H[i][j] /= scale;
                }
            }
        } else {
            const norm = Math.hypot(H[0][0], H[0][1], H[0][2],
                                    H[1][0], H[1][1], H[1][2],
                                    H[2][0], H[2][1], H[2][2]);
            if (norm > 1e-12) {
                for (let i = 0; i < 3; i++) {
                    for (let j = 0; j < 3; j++) {
                        H[i][j] /= norm;
                    }
                }
            }
        }
        return H;
    }

    // 地面点到图像
    function groundToImage(H, X, Y) {
        const p = [X, Y, 1];
        const res = numeric.dot(H, p);
        const inv = 1.0 / res[2];
        return [res[0]*inv, res[1]*inv];
    }

    // 图像点到平面 (通过单应)
    function imageToPlane(H, u, v) {
        const Hinv = numeric.inv(H);
        const p = [u, v, 1];
        const res = numeric.dot(Hinv, p);
        const inv = 1.0 / res[2];
        return [res[0]*inv, res[1]*inv];
    }

    // 分离 H0 的三列
    function splitH0(H0) {
        return [
            [H0[0][0], H0[1][0], H0[2][0]],
            [H0[0][1], H0[1][1], H0[2][1]],
            [H0[0][2], H0[1][2], H0[2][2]]
        ];
    }

    // ================================================================
    // 2. 塔吊底座鲁棒补全逻辑 (与 Python 一致)
    // ================================================================

    const BASE_LABELS = ["B1", "B2", "B3", "B4"];
    const OPPOSITE_CORNER = {
        "B1": "B3",
        "B2": "B4",
        "B3": "B1",
        "B4": "B2"
    };

    function buildTowerBaseWorldPoints(baseRadius) {
        const a = baseRadius / Math.sqrt(2);
        return {
            B1: [a, a],
            B2: [-a, a],
            B3: [-a, -a],
            B4: [a, -a],
            C: [0, 0]
        };
    }

    function countVisibleCorners(imageMarks) {
        const visible = [], missing = [];
        for (let label of BASE_LABELS) {
            if (imageMarks[label] !== null && imageMarks[label] !== undefined) {
                visible.push(label);
            } else {
                missing.push(label);
            }
        }
        return { visible, missing };
    }

    function estimateMissingFromThreeCorners(imageMarks, missingLabel) {
        const pts = {};
        for (let label of BASE_LABELS) {
            if (imageMarks[label] !== null && imageMarks[label] !== undefined) {
                pts[label] = imageMarks[label];
            }
        }
        if (missingLabel === "B1") {
            if (pts["B2"] && pts["B3"] && pts["B4"]) {
                return [pts["B2"][0] + pts["B4"][0] - pts["B3"][0],
                        pts["B2"][1] + pts["B4"][1] - pts["B3"][1]];
            }
        } else if (missingLabel === "B2") {
            if (pts["B1"] && pts["B3"] && pts["B4"]) {
                return [pts["B1"][0] + pts["B3"][0] - pts["B4"][0],
                        pts["B1"][1] + pts["B3"][1] - pts["B4"][1]];
            }
        } else if (missingLabel === "B3") {
            if (pts["B1"] && pts["B2"] && pts["B4"]) {
                return [pts["B2"][0] + pts["B4"][0] - pts["B1"][0],
                        pts["B2"][1] + pts["B4"][1] - pts["B1"][1]];
            }
        } else if (missingLabel === "B4") {
            if (pts["B1"] && pts["B2"] && pts["B3"]) {
                return [pts["B1"][0] + pts["B3"][0] - pts["B2"][0],
                        pts["B1"][1] + pts["B3"][1] - pts["B2"][1]];
            }
        }
        return null;
    }

    function estimateMissingFromCenter(imageMarks, missingLabel) {
        if (!imageMarks["C"]) return null;
        const opposite = OPPOSITE_CORNER[missingLabel];
        if (!imageMarks[opposite]) return null;
        const C = imageMarks["C"];
        const bOpp = imageMarks[opposite];
        return [2*C[0] - bOpp[0], 2*C[1] - bOpp[1]];
    }

    function completeBaseImageMarks(imageMarks, useCenterWhenFourCorners=true, blendCenterWeight=0.7) {
        const completed = {};
        for (let label of [...BASE_LABELS, "C"]) {
            completed[label] = (imageMarks[label] !== null && imageMarks[label] !== undefined) ? imageMarks[label] : null;
        }
        const { visible, missing } = countVisibleCorners(completed);
        const hasCenter = (completed["C"] !== null);
        let estimatedInfo = {
            estimatedLabels: [],
            method: "none",
            warning: null
        };

        if (visible.length === 4) {
            if (hasCenter && useCenterWhenFourCorners) {
                estimatedInfo.method = "four_corners_plus_center";
            } else {
                if (hasCenter) {
                    completed["C"] = null;
                    estimatedInfo.method = "four_corners_only_ignore_center";
                } else {
                    estimatedInfo.method = "four_corners_only";
                }
            }
            return { completed, estimatedInfo };
        }

        if (visible.length === 3 && missing.length === 1) {
            const missingLabel = missing[0];
            const estThree = estimateMissingFromThreeCorners(completed, missingLabel);
            const estCenter = hasCenter ? estimateMissingFromCenter(completed, missingLabel) : null;

            let result = null;
            let method = "";
            let warning = "";

            if (estThree !== null && estCenter !== null) {
                const w = Math.max(0, Math.min(1, blendCenterWeight));
                result = [w*estCenter[0] + (1-w)*estThree[0],
                          w*estCenter[1] + (1-w)*estThree[1]];
                method = "three_corners_plus_center_blend";
                warning = `使用3角点+中心点融合估计 ${missingLabel}，权重 center=${w.toFixed(2)}`;
            } else if (estCenter !== null) {
                result = estCenter;
                method = "three_corners_plus_center";
                warning = `使用中心点估计 ${missingLabel}`;
            } else if (estThree !== null) {
                result = estThree;
                method = "three_corners_affine";
                warning = `使用3角点仿射估计 ${missingLabel}`;
            } else {
                throw new Error("无法补全缺失角点");
            }

            completed[missingLabel] = result;
            estimatedInfo.estimatedLabels = [missingLabel];
            estimatedInfo.method = method;
            estimatedInfo.warning = warning;
            return { completed, estimatedInfo };
        }

        throw new Error(`当前可见角点数量 ${visible.length}，中心点可见=${hasCenter}，不支持此标定情况`);
    }

    function prepareGroundCorrespondences(imageMarks, baseRadius, useCenterWhenFourCorners, blendCenterWeight) {
        const { completed, estimatedInfo } = completeBaseImageMarks(
            imageMarks, useCenterWhenFourCorners, blendCenterWeight
        );
        const worldDict = buildTowerBaseWorldPoints(baseRadius);
        const validLabels = ["B1", "B2", "B3", "B4", "C"];
        let labelsUsed = [], worldPoints = [], imagePoints = [];
        for (let label of validLabels) {
            if (completed[label] !== null && completed[label] !== undefined) {
                labelsUsed.push(label);
                worldPoints.push(worldDict[label]);
                imagePoints.push(completed[label]);
            }
        }
        return { labelsUsed, worldPoints, imagePoints, completed, estimatedInfo };
    }

    function calibrateGroundHomography(imageMarks, baseRadius, useCenterWhenFourCorners=true, blendCenterWeight=0.7) {
        const { labelsUsed, worldPoints, imagePoints, completed, estimatedInfo } = prepareGroundCorrespondences(
            imageMarks, baseRadius, useCenterWhenFourCorners, blendCenterWeight
        );
        if (worldPoints.length < 4) throw new Error("地面 H0 标定至少需要 4 个点。");
        const H0 = computeHomography(worldPoints, imagePoints);
        return { H0, completed, estimatedInfo };
    }

    // ================================================================
    // 3. 其他模块 (p3估计、小车吊钩等) 保持不变
    // ================================================================

    function estimateP3(H0, verticalPoints) {
        const [p1, p2, p4] = splitH0(H0);
        const usable = [];
        for (let vp of verticalPoints) {
            const Z = vp[0];
            if (Math.abs(Z) < 1e-12) continue;
            const u = vp[1], v = vp[2];
            usable.push({ Z, x: [u, v, 1.0] });
        }
        if (usable.length < 2) throw new Error("至少需要2个有效垂直参考点");
        const n = usable.length;
        const A = [], b = [];
        for (let i = 0; i < n; i++) {
            const Z = usable[i].Z;
            const x = usable[i].x;
            for (let r = 0; r < 3; r++) {
                const row = new Array(3 + n).fill(0);
                row[r] = Z;
                row[3 + i] = -x[r];
                A.push(row);
                b.push(-p4[r]);
            }
        }
        const sol = leastSquares(A, b);
        return sol.slice(0, 3);
    }

    function homographyAtHeight(H0, p3, Z) {
        const [p1, p2, p4] = splitH0(H0);
        const col3 = [
            p4[0] + Z * p3[0],
            p4[1] + Z * p3[1],
            p4[2] + Z * p3[2]
        ];
        let HZ = [
            [p1[0], p2[0], col3[0]],
            [p1[1], p2[1], col3[1]],
            [p1[2], p2[2], col3[2]]
        ];
        const scale = HZ[2][2];
        if (Math.abs(scale) > 1e-12) {
            for (let i=0;i<3;i++) for (let j=0;j<3;j++) HZ[i][j] /= scale;
        }
        return HZ;
    }

    function imageToXYAtHeight(H0, p3, pt, Z) {
        const HZ = homographyAtHeight(H0, p3, Z);
        return imageToPlane(HZ, pt[0], pt[1]);
    }

    function estimateHeight(H0, p3, X, Y, pt) {
        const [p1, p2, p4] = splitH0(H0);
        const x = [pt[0], pt[1], 1];
        const q0 = [
            X*p1[0] + Y*p2[0] + p4[0],
            X*p1[1] + Y*p2[1] + p4[1],
            X*p1[2] + Y*p2[2] + p4[2]
        ];
        const A = [
            [p3[0], -x[0]],
            [p3[1], -x[1]],
            [p3[2], -x[2]]
        ];
        const b = [-q0[0], -q0[1], -q0[2]];
        const sol = leastSquares(A, b);
        return sol[0];
    }


    // ================================================================
    // 4.1 右下角 Risk Demo 绘图逻辑
    // ================================================================

    function getH0FromP(P) {
        return [
            [P[0][0], P[0][1], P[0][3]],
            [P[1][0], P[1][1], P[1][3]],
            [P[2][0], P[2][1], P[2][3]]
        ];
    }

    function groundToImageFromP(P, X, Y) {
        const Xh = [X, Y, 0, 1];
        const x = numeric.dot(P, Xh);
        return [x[0] / x[2], x[1] / x[2]];
    }

    function imageToGroundFromP(P, pixel) {
        const H0 = getH0FromP(P);
        const Hinv = numeric.inv(H0);
        const x = [pixel[0], pixel[1], 1];
        const Xh = numeric.dot(Hinv, x);
        return [Xh[0] / Xh[2], Xh[1] / Xh[2]];
    }

    function cross2JS(a, b) {
        return a[0] * b[1] - a[1] * b[0];
    }

    function dot2JS(a, b) {
        return a[0] * b[0] + a[1] * b[1];
    }

    function norm2JS(a) {
        return Math.hypot(a[0], a[1]);
    }

    function signedAngleJS(a, b) {
        return Math.atan2(cross2JS(a, b), dot2JS(a, b));
    }

    function wrap2PiJS(theta) {
        const twoPi = 2 * Math.PI;
        return ((theta % twoPi) + twoPi) % twoPi;
    }

    function computeSweepParamsJS(A, B, direction) {
        const rA = norm2JS(A);
        const rB = norm2JS(B);

        const aHat = [A[0] / rA, A[1] / rA];
        const bHat = [B[0] / rB, B[1] / rB];

        const sigma = direction === "ccw" ? 1.0 : -1.0;

        const alphaAB = signedAngleJS(aHat, bHat);
        const Delta = wrap2PiJS(sigma * alphaAB);

        return {
            A,
            B,
            rA,
            rB,
            aHat,
            bHat,
            sigma,
            Delta,
            DeltaDeg: Delta * 180 / Math.PI
        };
    }

    function pointProgressJS(P, sweep) {
        const rho = norm2JS(P);

        if (rho < 1e-12) {
            return {
                rho,
                delta: 0,
                deltaDeg: 0,
                hasDirection: false
            };
        }

        const pHat = [P[0] / rho, P[1] / rho];
        const alphaAP = signedAngleJS(sweep.aHat, pHat);
        const delta = wrap2PiJS(sweep.sigma * alphaAP);

        return {
            rho,
            delta,
            deltaDeg: delta * 180 / Math.PI,
            hasDirection: true
        };
    }

    function checkRisk1PointJS(P, sweep, boomLength) {
        const progress = pointProgressJS(P, sweep);

        const inRadius = progress.rho <= boomLength + 1e-9;
        const inAngle = !progress.hasDirection || progress.delta <= sweep.Delta + 1e-9;

        return {
            inside: inRadius && inAngle,
            rho: progress.rho,
            deltaDeg: progress.deltaDeg,
            inRadius,
            inAngle
        };
    }

    function pointToArcDistanceJS(P, sweep) {
        const A = sweep.A;
        const B = sweep.B;

        const r = 0.5 * (sweep.rA + sweep.rB);
        const rho = norm2JS(P);

        if (rho < 1e-12) {
            return {
                distance: r,
                closestPart: "center",
                rho,
                deltaDeg: null
            };
        }

        const progress = pointProgressJS(P, sweep);
        const inAngle = progress.delta <= sweep.Delta + 1e-12;

        if (inAngle) {
            return {
                distance: Math.abs(rho - r),
                closestPart: "arc_middle",
                rho,
                deltaDeg: progress.deltaDeg
            };
        }

        const dA = norm2JS([P[0] - A[0], P[1] - A[1]]);
        const dB = norm2JS([P[0] - B[0], P[1] - B[1]]);

        if (dA <= dB) {
            return {
                distance: dA,
                closestPart: "start_cap",
                rho,
                deltaDeg: progress.deltaDeg
            };
        }

        return {
            distance: dB,
            closestPart: "end_cap",
            rho,
            deltaDeg: progress.deltaDeg
        };
    }

    function checkRisk2PointJS(P, sweep, loadRadius) {
        const d = pointToArcDistanceJS(P, sweep);

        return {
            inside: d.distance <= loadRadius + 1e-12,
            distance: d.distance,
            closestPart: d.closestPart,
            rho: d.rho,
            deltaDeg: d.deltaDeg
        };
    }

    function buildRiskDemoFromP(P) {
        // 与 Python demo 保持一致
        const liftGround = [10.0, 0.0];
        const dropGround = [8.000170741682815, 6.000241409902737];

        const workerStartGround = [8.0, -1.0];
        const workerEndGround = [8.0, 8.0];

        const liftPixel = groundToImageFromP(P, liftGround[0], liftGround[1]);
        const dropPixel = groundToImageFromP(P, dropGround[0], dropGround[1]);
        const workerStartPixel = groundToImageFromP(P, workerStartGround[0], workerStartGround[1]);
        const workerEndPixel = groundToImageFromP(P, workerEndGround[0], workerEndGround[1]);

        const boomLength = 50.0;
        const loadRadius = 2.0;
        const direction = "ccw";
        const numSamples = 200;

        const A = imageToGroundFromP(P, liftPixel);
        const B = imageToGroundFromP(P, dropPixel);
        const P0 = imageToGroundFromP(P, workerStartPixel);
        const P1 = imageToGroundFromP(P, workerEndPixel);

        const sweep = computeSweepParamsJS(A, B, direction);

        let risk1Danger = false;
        let risk2Danger = false;
        let risk1Count = 0;
        let risk2Count = 0;
        let risk2MinDistance = Infinity;

        for (let k = 0; k <= numSamples; k++) {
            const t = k / numSamples;
            const Pw = [
                P0[0] + t * (P1[0] - P0[0]),
                P0[1] + t * (P1[1] - P0[1])
            ];

            const r1 = checkRisk1PointJS(Pw, sweep, boomLength);
            const r2 = checkRisk2PointJS(Pw, sweep, loadRadius);

            if (r1.inside) {
                risk1Danger = true;
                risk1Count++;
            }

            if (r2.inside) {
                risk2Danger = true;
                risk2Count++;
            }

            if (r2.distance < risk2MinDistance) {
                risk2MinDistance = r2.distance;
            }
        }

        return {
            P,
            liftGround,
            dropGround,
            workerStartGround,
            workerEndGround,
            liftPixel,
            dropPixel,
            workerStartPixel,
            workerEndPixel,
            boomLength,
            loadRadius,
            direction,
            numSamples,
            sweep,
            risk1Danger,
            risk2Danger,
            risk1Count,
            risk2Count,
            risk2MinDistance
        };
    }

    function updateRiskParamPanel(demo) {
        const el = document.getElementById("riskParamInfo");
        if (!el) return;

        // 每行一个参数，用 <br> 分隔，去掉多余空行
        el.innerHTML =

            `工人终点地面: (${demo.workerEndGround[0].toFixed(3)}, ${demo.workerEndGround[1].toFixed(3)}) m<br>` +
            `起吊点地面: (${demo.liftGround[0].toFixed(3)}, ${demo.liftGround[1].toFixed(3)}) m<br>` +

            `Risk2 吊物外扩: ${demo.risk2Danger ? "危险" : "安全"}，采样点 ${demo.risk2Count}<br>` +
            `Risk2 最小距离: ${demo.risk2MinDistance.toFixed(3)} m`;
    }

    function fitCanvas(canvas) {
        const rect = canvas.getBoundingClientRect();
        let w = rect.width;
        let h = rect.height;

        // 如果尺寸为0，尝试从父容器获取
        if (w === 0 || h === 0) {
            const parent = canvas.parentElement;
            if (parent) {
                const parentRect = parent.getBoundingClientRect();
                w = parentRect.width || 300;
                h = parentRect.height || 200;
            } else {
                w = 300;
                h = 200;
            }
        }

        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(w * dpr));
        canvas.height = Math.max(1, Math.floor(h * dpr));

        const ctx = canvas.getContext("2d");
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        return { ctx, width: w, height: h };
    }

    function makeWorldMapper(points, width, height, padding = 28) {
        let minX = Infinity, maxX = -Infinity;
        let minY = Infinity, maxY = -Infinity;

        points.forEach(p => {
            minX = Math.min(minX, p[0]);
            maxX = Math.max(maxX, p[0]);
            minY = Math.min(minY, p[1]);
            maxY = Math.max(maxY, p[1]);
        });

        const spanX = Math.max(1e-6, maxX - minX);
        const spanY = Math.max(1e-6, maxY - minY);

        const scale = Math.min(
            (width - 2 * padding) / spanX,
            (height - 2 * padding) / spanY
        );

        const cx = 0.5 * (minX + maxX);
        const cy = 0.5 * (minY + maxY);

        return function map(p) {
            return [
                width / 2 + (p[0] - cx) * scale,
                height / 2 - (p[1] - cy) * scale
            ];
        };
    }

    function drawRisk3D(demo) {
        const canvas = document.getElementById("risk3DCanvas");
        if (!canvas) return;

        const { ctx, width, height } = fitCanvas(canvas);
        ctx.clearRect(0, 0, width, height);

        const O = [0, 0, 0];
        const A = [demo.liftGround[0], demo.liftGround[1], 0];
        const B = [demo.dropGround[0], demo.dropGround[1], 0];
        const P0 = [demo.workerStartGround[0], demo.workerStartGround[1], 0];
        const P1 = [demo.workerEndGround[0], demo.workerEndGround[1], 0];
        const towerTop = [0, 0, 12]; // 塔顶高度
        const boomHeight = 10;

        // 收集所有点计算范围
        const allPoints = [O, A, B, P0, P1, towerTop, 
                           [A[0], A[1], boomHeight], [B[0], B[1], boomHeight]];
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
        allPoints.forEach(p => {
            if (p[0] < minX) minX = p[0];
            if (p[0] > maxX) maxX = p[0];
            if (p[1] < minY) minY = p[1];
            if (p[1] > maxY) maxY = p[1];
            if (p[2] < minZ) minZ = p[2];
            if (p[2] > maxZ) maxZ = p[2];
        });
        // 增加边界余量
        const pad = 1.5;
        minX -= pad; maxX += pad; minY -= pad; maxY += pad; minZ -= pad; maxZ += pad;
        const spanX = maxX - minX || 1;
        const spanY = maxY - minY || 1;
        const spanZ = maxZ - minZ || 1;

        // 等距投影参数（保持比例）
        const projX = 1.0;         // x轴水平因子
        const projY = 0.55;        // y轴斜向因子
        const projZ = 0.45;        // z轴垂直因子（与y共享垂直空间）
        const scaleX = (width) / (spanX + projY * spanY);
        const scaleZ = (height) / (projZ * spanY + spanZ);
        const scale = Math.min(scaleX, scaleZ) * 0.9;

        const cx = 0.5 * (minX + maxX);
        const cy = 0.5 * (minY + maxY);
        const cz = 0.5 * (minZ + maxZ);

        function project3D(p) {
            const x = p[0] - cx;
            const y = p[1] - cy;
            const z = p[2] - cz;
            const px = width/2 + scale * (x - projY * y);
            const py = height/2 - scale * (projZ * y + z);
            return [px, py];
        }

        // 绘图辅助函数
        function line(p, q, color, lw = 2) {
            const a = project3D(p);
            const b = project3D(q);
            ctx.beginPath();
            ctx.moveTo(a[0], a[1]);
            ctx.lineTo(b[0], b[1]);
            ctx.strokeStyle = color;
            ctx.lineWidth = lw;
            ctx.stroke();
        }

        function point(p, color, r = 4) {
            const a = project3D(p);
            ctx.beginPath();
            ctx.arc(a[0], a[1], r, 0, 2 * Math.PI);
            ctx.fillStyle = color;
            ctx.fill();
        }

        function text(p, txt, color = "#334155", offsetX = 5, offsetY = -5) {
            const a = project3D(p);
            ctx.fillStyle = color;
            ctx.font = "12px Times New Roman";
            ctx.fillText(txt, a[0] + offsetX, a[1] + offsetY);
        }

        // ---- 绘图 ----
        // 地面网格（简单示意）
        ctx.strokeStyle = "#e2e8f0";
        ctx.lineWidth = 1;
        for (let i = -5; i <= 15; i += 5) {
            line([i, -5, 0], [i, 15, 0], "#e2e8f0", 1);
            line([-5, i, 0], [15, i, 0], "#e2e8f0", 1);
        }

        // 塔身
        line(O, towerTop, "#64748b", 3);

        // 大臂（起始、终止）
        line([0, 0, boomHeight], [A[0], A[1], boomHeight], "#2563eb", 3);
        line([0, 0, boomHeight], [B[0], B[1], boomHeight], "#dc2626", 3);

        // 地面投影线
        line(O, A, "rgba(37,99,235,0.35)", 2);
        line(O, B, "rgba(220,38,38,0.35)", 2);

        // 工人轨迹
        line(P0, P1, "#16a34a", 5);

        // 标记点
        point(O, "#0f172a", 4);
        point(A, "#2563eb", 4);
        point(B, "#dc2626", 4);
        point(P0, "#16a34a", 4);
        point(P1, "#22c55e", 4);

        text(O, "O");
        text(A, "Lift", "#2563eb");
        text(B, "Drop", "#dc2626");
        text(P1, "Worker", "#16a34a");
    }

    function drawRiskTopView(demo) {
        const canvas = document.getElementById("riskTopCanvas");
        if (!canvas) return;

        const { ctx, width, height } = fitCanvas(canvas);
        ctx.clearRect(0, 0, width, height);

        const O = [0, 0];
        const A = demo.liftGround;
        const B = demo.dropGround;
        const P0 = demo.workerStartGround;
        const P1 = demo.workerEndGround;
        const boomLength = demo.boomLength;
        const loadRadius = demo.loadRadius;
        const sweep = demo.sweep;

        // 生成扇形边界点
        const steps = 60;
        const startAng = Math.atan2(A[1], A[0]);
        const sigma = sweep.sigma;
        const Delta = sweep.Delta;
        const fanPoints = [];
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const ang = startAng + sigma * Delta * t;
            const r = boomLength;
            fanPoints.push([r * Math.cos(ang), r * Math.sin(ang)]);
        }
        // 负载轨迹点
        const midR = 0.5 * (sweep.rA + sweep.rB);
        const loadPoints = [];
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const ang = startAng + sigma * Delta * t;
            const r = midR;
            loadPoints.push([r * Math.cos(ang), r * Math.sin(ang)]);
        }

        // 所有需要显示的点
        const allPoints = [
            [-2, -2], [14, 14],
            A, B, P0, P1,
            [boomLength * 0.25, boomLength * 0.25],
            ...fanPoints,
            ...loadPoints
        ];

        const map = makeWorldMapper(allPoints, width, height, 20);

        function drawLine(p, q, color, lw = 2) {
            const a = map(p);
            const b = map(q);
            ctx.beginPath();
            ctx.moveTo(a[0], a[1]);
            ctx.lineTo(b[0], b[1]);
            ctx.strokeStyle = color;
            ctx.lineWidth = lw;
            ctx.stroke();
        }

        function drawPoint(p, color, r = 4) {
            const a = map(p);
            ctx.beginPath();
            ctx.arc(a[0], a[1], r, 0, 2 * Math.PI);
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawText(p, txt, color = "#334155", offsetX = 5, offsetY = -5) {
            const a = map(p);
            ctx.fillStyle = color;
            ctx.font = "12px Times New Roman";
            ctx.fillText(txt, a[0] + offsetX, a[1] + offsetY);
        }

        // ---- 绘图 ----
        // 坐标轴
        drawLine([-2, 0], [14, 0], "#cbd5e1", 1);
        drawLine([0, -2], [0, 14], "#cbd5e1", 1);

        // Risk1 大臂扫过区域
        ctx.beginPath();
        let center = map(O);
        ctx.moveTo(center[0], center[1]);
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const ang = startAng + sigma * Delta * t;
            const p = [boomLength * Math.cos(ang), boomLength * Math.sin(ang)];
            const q = map(p);
            ctx.lineTo(q[0], q[1]);
        }
        ctx.closePath();
        ctx.fillStyle = "rgba(249,115,22,0.25)";
        ctx.fill();

        // Risk2 吊物轨迹（粗线表示外扩区域）
        ctx.beginPath();
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const ang = startAng + sigma * Delta * t;
            const r = midR;
            const p = [r * Math.cos(ang), r * Math.sin(ang)];
            const q = map(p);
            if (i === 0) ctx.moveTo(q[0], q[1]);
            else ctx.lineTo(q[0], q[1]);
        }
        const pRef1 = map([0, 0]);
        const pRef2 = map([loadRadius, 0]);
        const pixelLoadRadius = Math.abs(pRef2[0] - pRef1[0]);
        ctx.strokeStyle = "rgba(59,130,246,0.40)";
        ctx.lineWidth = Math.max(4, 2 * pixelLoadRadius);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();

        // 起始臂、终止臂
        drawLine(O, A, "#2563eb", 3);
        drawLine(O, B, "#dc2626", 3);

        // 工人轨迹
        drawLine(P0, P1, "#16a34a", 6);

        // 标记点
        drawPoint(O, "#0f172a", 4);
        drawPoint(A, "#2563eb", 4);
        drawPoint(B, "#dc2626", 4);
        drawPoint(P0, "#16a34a", 4);
        drawPoint(P1, "#22c55e", 4);

        drawText(O, "O");
        drawText(A, "Lift", "#2563eb");
        drawText(B, "Drop", "#dc2626");
        drawText(P0, "Worker Start", "#16a34a");
        drawText(P1, "Worker End", "#16a34a");
    }

    function updateRiskDrawArea(Pmat) {
        const demo = buildRiskDemoFromP(Pmat);
        updateRiskParamPanel(demo);

        // 等待浏览器完成布局后再绘制
        requestAnimationFrame(() => {
            drawRisk3D(demo);
            drawRiskTopView(demo);
        });
    }

    function renderMatrix(matrix) {
        const grid = document.getElementById('matrixGrid');
        if (!grid) return;
        grid.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 4; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = matrix[i][j].toFixed(6);
                grid.appendChild(cell);
            }
        }
    }

    // ================================================================
    // 4. 主计算流程 (与 Demo3 对标)
    // ================================================================
    function calibrateCamera() {
        try {
            document.getElementById('calibStatus').innerHTML = '';
            document.getElementById('cameraMatrixDisplay').innerHTML = '计算中...';

            // ---- 读取底座数据 ----
            const baseRadius = parseFloat(document.getElementById('baseRadius').value);
            if (isNaN(baseRadius) || baseRadius <= 0) throw new Error("底座距离必须为正数");

            // 构造 imageMarks 对象 (null 表示缺失)
            const imageMarks = {
                B1: [parseFloat(document.getElementById('b1u').value), parseFloat(document.getElementById('b1v').value)],
                B2: [parseFloat(document.getElementById('b2u').value), parseFloat(document.getElementById('b2v').value)],
                B3: [parseFloat(document.getElementById('b3u').value), parseFloat(document.getElementById('b3v').value)],
                B4: [parseFloat(document.getElementById('b4u').value), parseFloat(document.getElementById('b4v').value)],
                C: null
            };
            const cu = document.getElementById('cu').value, cv = document.getElementById('cv').value;
            if (cu && cv) {
                imageMarks.C = [parseFloat(cu), parseFloat(cv)];
            }

            // 检查每个点是否有效 (如果是 NaN 则置为 null)
            for (let key of ['B1','B2','B3','B4','C']) {
                if (imageMarks[key] !== null && (isNaN(imageMarks[key][0]) || isNaN(imageMarks[key][1]))) {
                    imageMarks[key] = null;
                }
            }

            // ---- 鲁棒底座标定 ----
            const useCenter = true;  // 若有中心则使用，但 demo3 无中心所以不会用
            const blendWeight = 0.7;
            const { H0, completed, estimatedInfo } = calibrateGroundHomography(
                imageMarks, baseRadius, useCenter, blendWeight
            );

            // 收集补全信息
            let infoMsg = "";
            if (estimatedInfo.estimatedLabels.length > 0) {
                infoMsg = `⚠️ 底座点补全: ${estimatedInfo.estimatedLabels.join(', ')} (方法: ${estimatedInfo.method})`;
                if (estimatedInfo.warning) infoMsg += ` ${estimatedInfo.warning}`;
            }

            // ---- 垂直参考点 ----
            const vrows = document.querySelectorAll('.vpoint-row');
            let verticalPts = [];
            vrows.forEach(row => {
                let Z = parseFloat(row.querySelector('.vz').value);
                let u = parseFloat(row.querySelector('.vu').value);
                let v = parseFloat(row.querySelector('.vv').value);
                if (!isNaN(Z) && !isNaN(u) && !isNaN(v)) verticalPts.push([Z, u, v]);
            });
            if (verticalPts.length < 2) throw new Error("至少需要2个垂直参考点");

            // ---- 估计 p3 ----
            const p3 = estimateP3(H0, verticalPts);

            // ---- 小车与吊钩 ----
            const trolleyHeight = parseFloat(document.getElementById('trolleyHeight').value);
            const trolleyPixel = [parseFloat(document.getElementById('trolleyU').value), parseFloat(document.getElementById('trolleyV').value)];
            const hookPixel = [parseFloat(document.getElementById('hookU').value), parseFloat(document.getElementById('hookV').value)];

            // ---- 计算吊物位置 ----
            const [X, Y] = imageToXYAtHeight(H0, p3, trolleyPixel, trolleyHeight);
            const Z_hook = estimateHeight(H0, p3, X, Y, hookPixel);
            const groundPixel = groundToImage(H0, X, Y);
            const trolleyRadius = Math.hypot(X, Y);
            const theta_deg = Math.atan2(Y, X) * 180 / Math.PI;

            // ---- 构建 4x3 矩阵 (保留更多小数以便对比) ----
            const [p1, p2, p4] = splitH0(H0);
            const Pmat = [
                [p1[0], p2[0], p3[0], p4[0]],
                [p1[1], p2[1], p3[1], p4[1]],
                [p1[2], p2[2], p3[2], p4[2]]
            ];

            // ---- 更新右下角 Risk Demo 绘图区 ----
            updateRiskDrawArea(Pmat);

            // ---- 渲染矩阵网格 ----
            window.lastPmat = Pmat;
            renderMatrix(Pmat);

            // 显示结果 (保留6位小数)
            let statusHtml = `
                <div class="success-info">
                    ✅ 标定成功<br>
                    📍 地面投影点 (像素): (${groundPixel[0].toFixed(3)}, ${groundPixel[1].toFixed(3)})<br>
                    🏗️ 吊物空间点: (${X.toFixed(3)}, ${Y.toFixed(3)}, ${Z_hook.toFixed(3)})(m)<br>
                    📏 小车半径: ${trolleyRadius.toFixed(3)} m, 角度: ${theta_deg.toFixed(3)}°
            `;
            if (infoMsg) {
                statusHtml += `<br>📌 ${infoMsg}`;
            }
            statusHtml += `</div>`;
            document.getElementById('calibStatus').innerHTML = statusHtml;

        } catch (err) {
            document.getElementById('calibStatus').innerHTML = `<div class="error-msg">❌ 标定失败: ${err.message}</div>`;
            document.getElementById('cameraMatrixDisplay').innerHTML = "计算失败";
        }
    }

    // ================================================================
    // 5. 视频交互选取 (不变)
    // ================================================================
    let activePickMode = null, pickCallback = null;
    const video = document.getElementById('mainVideo');

    function getVideoOriginalCoordinates(event) {
        const rect = video.getBoundingClientRect();
        const scaleX = video.videoWidth / rect.width;
        const scaleY = video.videoHeight / rect.height;
        let u = (event.clientX - rect.left) * scaleX;
        let v = (event.clientY - rect.top) * scaleY;
        u = Math.min(Math.max(0, u), video.videoWidth);
        v = Math.min(Math.max(0, v), video.videoHeight);
        return { u, v };
    }

    function enterPickMode(targetId, callback) {
        if (activePickMode) video.style.cursor = "default";
        activePickMode = targetId;
        video.style.cursor = "crosshair";
        document.getElementById('pickTip').innerHTML = `✏️ 正在选取: ${targetId}`;
        pickCallback = callback;
    }

    function onVideoClick(event) {
        if (!activePickMode) return;
        const { u, v } = getVideoOriginalCoordinates(event);
        if (pickCallback) pickCallback(activePickMode, u, v);
        video.style.cursor = "default";
        activePickMode = null;
        document.getElementById('pickTip').innerHTML = '✅ 坐标已选取';
        setTimeout(() => {
            if (!activePickMode) document.getElementById('pickTip').innerHTML = '✏️ 点击「选取」按钮，再点击视频获取坐标';
        }, 1500);
    }
    video.addEventListener('click', onVideoClick);

    function bindPickButtons() {
        const mappings = [
            { id:'b1', uId:'b1u', vId:'b1v' }, { id:'b2', uId:'b2u', vId:'b2v' },
            { id:'b3', uId:'b3u', vId:'b3v' }, { id:'b4', uId:'b4u', vId:'b4v' },
            { id:'c', uId:'cu', vId:'cv' }, { id:'trolley', uId:'trolleyU', vId:'trolleyV' },
            { id:'hook', uId:'hookU', vId:'hookV' }
        ];
        mappings.forEach(m => {
            const btn = document.querySelector(`button.pick-btn[data-target="${m.id}"]`);
            if (btn) {
                btn.addEventListener('click', () => {
                    enterPickMode(m.id, (mode, u, v) => {
                        document.getElementById(m.uId).value = u.toFixed(3);  // 保留3位小数，与Python一致
                        document.getElementById(m.vId).value = v.toFixed(3);
                    });
                });
            }
        });
    }

    function handleVerticalPick(e) {
        const btn = e.currentTarget;
        const row = btn.closest('.vpoint-row');
        const idx = row.getAttribute('data-idx');
        enterPickMode(`vertical_${idx}`, (mode, u, v) => {
            row.querySelector('.vu').value = u.toFixed(3);
            row.querySelector('.vv').value = v.toFixed(3);
        });
    }

    function addVerticalPoint() {
        const container = document.getElementById('verticalPointsContainer');
        const idx = container.children.length;
        const newRow = document.createElement('div');
        newRow.className = 'vpoint-row';
        newRow.setAttribute('data-idx', idx);
        newRow.innerHTML = `
            <div class="field"><label>Z${idx+1} (m)</label><input class="vz" type="number" value="15.00"></div>
            <div class="field"><label>u</label><input class="vu" type="number" value="770.000"></div>
            <div class="field"><label>v</label><input class="vv" type="number" value="120.000"></div>
            <button class="pick-btn pick-vertical" data-idx="${idx}">选取</button>
        `;
        container.appendChild(newRow);
        newRow.querySelector('.pick-vertical').addEventListener('click', handleVerticalPick);
    }

    window.addEventListener('DOMContentLoaded', () => {
        bindPickButtons();
        document.getElementById('addVerticalPoint').addEventListener('click', addVerticalPoint);
        document.getElementById('calibrateBtn').addEventListener('click', calibrateCamera);
        video.muted = true;
        video.play().catch(e => console.log("自动播放被阻止"));
        document.querySelectorAll('.pick-vertical').forEach(btn => btn.addEventListener('click', handleVerticalPick));

        const observer = new MutationObserver(() => {
            document.querySelectorAll('.pick-vertical').forEach(btn => {
                btn.removeEventListener('click', handleVerticalPick);
                btn.addEventListener('click', handleVerticalPick);
            });
        });

        observer.observe(document.getElementById('verticalPointsContainer'), { childList: true, subtree: true });

        window.addEventListener("resize", () => {
            if (window.lastPmat) renderMatrix(window.lastPmat);
        });
    });
</script>
