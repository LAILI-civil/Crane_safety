<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>塔吊智能监控标定 | 相机矩阵计算 (最终稳定版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/numeric/1.2.6/numeric.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Times New Roman', 'Segoe UI', 'Roboto', system-ui, sans-serif; }
        .split-layout { display: flex; width: 100%; height: 100%; flex-direction: row; }
        .left-video { flex: 1; background-color: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        .left-video video { width: 100%; height: 100%; object-fit: contain; background-color: #000; outline: none; cursor: crosshair; }
        .pick-tip { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); color: #ffdd99; font-size: 13px; padding: 6px 14px; border-radius: 24px; pointer-events: none; font-family: monospace; z-index: 10; border-left: 3px solid #ffaa33; white-space: nowrap; }
        .right-panel { flex: 1; display: flex; flex-direction: column; background: #f1f5f9; overflow: hidden; }
        .calib-area { flex: 1; overflow-y: auto; padding: 12px 16px; background: #ffffff; border-bottom: 1px solid #e2e8f0; }
        .calib-area h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 14px; border-left: 3px solid #3b82f6; padding-left: 10px; }
        .horizontal-cards { display: flex; flex-wrap: nowrap; gap: 12px; margin-bottom: 20px; }
        .param-card { flex: 1; min-width: 0; background: #f8fafc; border-radius: 16px; padding: 10px 12px; border: 1px solid #e2edff; }
        .param-card h4 { font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; border-left: 2px solid #3b82f6; padding-left: 6px; white-space: nowrap; }
        .compact-row { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 6px; margin-bottom: 6px; }
        .compact-field { flex: 1; min-width: 70px; }
        .compact-field label { display: block; font-size: 0.6rem; font-weight: 500; margin-bottom: 2px; white-space: nowrap; }
        .coord-small { display: flex; gap: 4px; }
        .coord-small input { width: 65px; }
        input { padding: 4px 6px; border-radius: 8px; border: 1px solid #cbd5e1; background: white; font-size: 0.75rem; width: 100%; font-family: monospace; }
        button.pick-btn { background: #eef2ff; border: none; border-radius: 8px; padding: 4px 10px; font-size: 0.65rem; font-weight: 500; color: #2563eb; cursor: pointer; white-space: nowrap; height: 28px; }
        .vpoint-row { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 4px; margin-bottom: 6px; background: #ffffffcc; padding: 4px; border-radius: 10px; }
        .vpoint-row .field { flex: 1; min-width: 45px; }
        .vpoint-row input { padding: 3px 4px; font-size: 0.65rem; }
        .add-point-btn { background: #eef2ff; border: 1px solid #cbd5e1; border-radius: 16px; padding: 4px 8px; font-size: 0.65rem; cursor: pointer; margin-top: 4px; width: 100%; text-align: center; }
        button.calc-btn { background: #3b82f6; color: white; border: none; border-radius: 28px; padding: 8px 16px; font-weight: 600; font-size: 0.85rem; cursor: pointer; width: 100%; margin: 8px 0 12px 0; }
        .matrix-output { background: #0f172a; color: #e2e8f0; border-radius: 16px; padding: 10px; font-family: 'Courier New', monospace; font-size: 0.65rem; overflow-x: auto; margin-top: 10px; }
        .matrix-output pre { white-space: pre-wrap; word-break: break-all; margin: 0; }
        .error-msg { color: #dc2626; background: #fee2e2; padding: 6px; border-radius: 10px; font-size: 0.7rem; margin: 6px 0; }
        .success-info { color: #16a34a; background: #e0f2e9; padding: 5px 8px; border-radius: 10px; font-size: 0.7rem; }
        .draw-area { flex: 1; background: #fefcf5; border-top: 2px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: #94a3b8; font-size: 0.85rem; }
        .draw-area::before { content: "📐 绘图区 (预留)"; font-weight: 500; opacity: 0.7; }
        @media (max-width: 900px) { .horizontal-cards { overflow-x: auto; } .param-card { min-width: 260px; } }
    </style>
</head>
<body>
<div class="split-layout">
    <div class="left-video">
        <video id="mainVideo" controls preload="auto" playsinline crossorigin="anonymous">
            <source src="./Crane_working_1.mp4" type="video/mp4">
            浏览器不支持视频播放。
        </video>
        <div class="pick-tip" id="pickTip">✏️ 点击「选取」按钮，再点击视频获取坐标</div>
    </div>

    <div class="right-panel">
        <div class="calib-area">
            <h3>📐 相机标定 & 4x3 投影矩阵</h3>
            <div class="horizontal-cards">
                <!-- 塔吊底座参数 -->
                <div class="param-card">
                    <h4>🏗️ 塔吊底座参数</h4>
                    <div class="compact-row">
                        <div class="compact-field">
                            <label>中心到底座角点距离 (米)</label>
                            <input type="number" id="baseRadius" value="2.0" step="0.1">
                        </div>
                    </div>
                    <div style="margin: 4px 0 2px 0;"><label style="font-size:0.6rem;">📍 底座图像角点</label></div>
                    <div class="compact-row"><div class="compact-field"><label>B1 (u,v)</label><div class="coord-small"><input id="b1u" value="705.720"><input id="b1v" value="403.008"></div></div><button class="pick-btn" data-target="b1">选取</button></div>
                    <div class="compact-row"><div class="compact-field"><label>B2 (u,v)</label><div class="coord-small"><input id="b2u" value="596.730"><input id="b2v" value="391.163"></div></div><button class="pick-btn" data-target="b2">选取</button></div>
                    <div class="compact-row"><div class="compact-field"><label>B3 (u,v)</label><div class="coord-small"><input id="b3u" value="573.343"><input id="b3v" value="437.234"></div></div><button class="pick-btn" data-target="b3">选取</button></div>
                    <div class="compact-row"><div class="compact-field"><label>B4 (u,v)</label><div class="coord-small"><input id="b4u" value="683.393"><input id="b4v" value="448.919"></div></div><button class="pick-btn" data-target="b4">选取</button></div>
                    <div class="compact-row"><div class="compact-field"><label>C 中心 (可选)</label><div class="coord-small"><input id="cu" value=""><input id="cv" value=""></div></div><button class="pick-btn" data-target="c">选取</button></div>
                </div>

                <!-- 塔身垂直参考点 -->
                <div class="param-card">
                    <h4>📏 塔身垂直参考点 (Z, u, v)</h4>
                    <div id="verticalPointsContainer">
                        <div class="vpoint-row" data-idx="0">
                            <div class="field"><label>Z1(m)</label><input class="vz" type="number" value="10.0"></div>
                            <div class="field"><label>u</label><input class="vu" type="number" value="727.273"></div>
                            <div class="field"><label>v</label><input class="vv" type="number" value="222.222"></div>
                            <button class="pick-btn pick-vertical" data-idx="0">选取</button>
                        </div>
                        <div class="vpoint-row" data-idx="1">
                            <div class="field"><label>Z2(m)</label><input class="vz" type="number" value="20.0"></div>
                            <div class="field"><label>u</label><input class="vu" type="number" value="816.327"></div>
                            <div class="field"><label>v</label><input class="vv" type="number" value="20.408"></div>
                            <button class="pick-btn pick-vertical" data-idx="1">选取</button>
                        </div>
                    </div>
                    <button id="addVerticalPoint" class="add-point-btn">+ 添加参考点</button>
                </div>

                <!-- 小车与吊钩关键点 -->
                <div class="param-card">
                    <h4>🚛 小车与吊钩关键点</h4>
                    <div class="compact-row"><div class="compact-field"><label>小车高度 (米)</label><input id="trolleyHeight" type="number" value="10.0"></div></div>
                    <div class="compact-row"><div class="compact-field"><label>小车像素 (u,v)</label><div class="coord-small"><input id="trolleyU" value="1074.219"><input id="trolleyV" value="166.016"></div></div><button class="pick-btn" data-target="trolley">选取</button></div>
                    <div class="compact-row"><div class="compact-field"><label>吊钩像素 (u,v)</label><div class="coord-small"><input id="hookU" value="1038.911"><input id="hookV" value="243.191"></div></div><button class="pick-btn" data-target="hook">选取</button></div>
                    <div class="compact-row"><div class="compact-field"><label>小车半径 (米) 可选校验</label><input id="trolleyRadius" type="number" value="10.0"></div></div>
                </div>
            </div>
            <button id="calibrateBtn" class="calc-btn">🔧 计算相机矩阵 (4x3 投影矩阵)</button>
            <div id="resultPanel">
                <div class="matrix-output"><strong>📷 4×3 相机投影矩阵 P</strong><pre id="cameraMatrixDisplay">尚未计算</pre></div>
                <div id="calibStatus"></div>
            </div>
        </div>
        <div class="draw-area"></div>
    </div>
</div>

<script>
    // =================================================================
    // 核心数学函数 (全部重写，确保稳定)
    // =================================================================

    // 最小二乘解 Ax = b (使用 SVD，数值稳定)
    function leastSquares(A, b) {
        const svd = numeric.svd(A);
        const U = svd.U, S = svd.S, V = svd.V;
        const tol = 1e-12 * S[0];
        const m = U.length, n = V.length;
        const x = new Array(n).fill(0);
        // 对每个奇异值，计算贡献
        for (let i = 0; i < S.length; i++) {
            if (S[i] > tol) {
                const invS = 1.0 / S[i];
                // U 的第 i 列
                const ui = U.map(row => row[i]);
                const ui_dot_b = numeric.dot(ui, b);
                const coeff = invS * ui_dot_b;
                // V 的第 i 列
                for (let j = 0; j < n; j++) {
                    x[j] += V[j][i] * coeff;
                }
            }
        }
        return x;
    }

    // 二维点归一化: 返回归一化后的点集和变换矩阵 T
    function normalizePoints(points) {
        const n = points.length;
        let meanX = 0, meanY = 0;
        for (let i = 0; i < n; i++) { meanX += points[i][0]; meanY += points[i][1]; }
        meanX /= n; meanY /= n;
        const centered = points.map(p => [p[0] - meanX, p[1] - meanY]);
        let sumDist = 0;
        for (let i = 0; i < n; i++) sumDist += Math.hypot(centered[i][0], centered[i][1]);
        const meanDist = sumDist / n;
        const scale = Math.sqrt(2) / meanDist;
        const T = [
            [scale, 0, -scale * meanX],
            [0, scale, -scale * meanY],
            [0, 0, 1]
        ];
        const normPoints = points.map(p => {
            const ph = [p[0], p[1], 1];
            const res = numeric.dot(T, ph);
            return [res[0] / res[2], res[1] / res[2]];
        });
        return { normPoints, T };
    }

    // 计算单应矩阵 H (世界平面 -> 图像平面)
    function computeHomography(worldPts, imgPts) {
        if (worldPts.length < 4) throw new Error("至少需要4对点");
        const { normPoints: worldNorm, T: Tw } = normalizePoints(worldPts);
        const { normPoints: imgNorm, T: Ti } = normalizePoints(imgPts);
        const A = [];
        for (let i = 0; i < worldNorm.length; i++) {
            const X = worldNorm[i][0], Y = worldNorm[i][1];
            const u = imgNorm[i][0], v = imgNorm[i][1];
            A.push([X, Y, 1, 0, 0, 0, -u*X, -u*Y, -u]);
            A.push([0, 0, 0, X, Y, 1, -v*X, -v*Y, -v]);
        }
        // 求最小奇异值对应的右奇异向量
        const svd = numeric.svd(A);
        const V = svd.V;          // V 是 9x9 矩阵
        const h = V.map(row => row[V[0].length - 1]); // 最后一列
        const Hn = [
            [h[0], h[1], h[2]],
            [h[3], h[4], h[5]],
            [h[6], h[7], h[8]]
        ];
        const TiInv = numeric.inv(Ti);
        let H = numeric.dot(numeric.dot(TiInv, Hn), Tw);
        const scale = H[2][2];
        if (Math.abs(scale) > 1e-12) {
            for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) H[i][j] /= scale;
        } else {
            const normH = Math.hypot(H[0][0], H[0][1], H[0][2], H[1][0], H[1][1], H[1][2], H[2][0], H[2][1], H[2][2]);
            for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) H[i][j] /= normH;
        }
        return H;
    }

    // 地面点 (X,Y,0) 投影到图像
    function groundToImage(H, X, Y) {
        const p = [X, Y, 1];
        const res = numeric.dot(H, p);
        const inv = 1.0 / res[2];
        return [res[0] * inv, res[1] * inv];
    }

    // 通过单应矩阵将图像点投影到平面
    function imageToPlane(H, u, v) {
        const Hinv = numeric.inv(H);
        const p = [u, v, 1];
        const res = numeric.dot(Hinv, p);
        const inv = 1.0 / res[2];
        return [res[0] * inv, res[1] * inv];
    }

    // 分离 H0 的三列
    function splitH0(H0) {
        return [
            [H0[0][0], H0[1][0], H0[2][0]],
            [H0[0][1], H0[1][1], H0[2][1]],
            [H0[0][2], H0[1][2], H0[2][2]]
        ];
    }

    // 估计 p3 (垂直方向投影列)
    function estimateP3(H0, verticalPoints) {
        const [p1, p2, p4] = splitH0(H0);
        const usable = [];
        for (let vp of verticalPoints) {
            const Z = vp[0];
            if (Math.abs(Z) < 1e-9) continue;
            const u = vp[1], v = vp[2];
            usable.push({ Z, x: [u, v, 1.0] });
        }
        if (usable.length < 2) throw new Error("至少需要2个有效垂直参考点");
        const n = usable.length;
        const A = [], b = [];
        for (let i = 0; i < n; i++) {
            const Z = usable[i].Z;
            const x = usable[i].x;
            for (let r = 0; r < 3; r++) {
                const row = new Array(3 + n).fill(0);
                row[r] = Z;           // p3 分量
                row[3 + i] = -x[r];   // alpha_i
                A.push(row);
                b.push(-p4[r]);
            }
        }
        const sol = leastSquares(A, b);
        const p3 = sol.slice(0, 3);
        return p3;
    }

    // 构造高度 Z 处的单应矩阵 H_Z
    function homographyAtHeight(H0, p3, Z) {
        const [p1, p2, p4] = splitH0(H0);
        const col3 = [
            p4[0] + Z * p3[0],
            p4[1] + Z * p3[1],
            p4[2] + Z * p3[2]
        ];
        let HZ = [
            [p1[0], p2[0], col3[0]],
            [p1[1], p2[1], col3[1]],
            [p1[2], p2[2], col3[2]]
        ];
        const scale = HZ[2][2];
        if (Math.abs(scale) > 1e-12) {
            for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) HZ[i][j] /= scale;
        }
        return HZ;
    }

    // 已知高度 Z 和图像点，求水平坐标 (X,Y)
    function imageToXYAtHeight(H0, p3, pt, Z) {
        const HZ = homographyAtHeight(H0, p3, Z);
        return imageToPlane(HZ, pt[0], pt[1]);
    }

    // 已知 (X,Y) 和图像点，估计高度 Z
    function estimateHeight(H0, p3, X, Y, pt) {
        const [p1, p2, p4] = splitH0(H0);
        const x = [pt[0], pt[1], 1];
        const q0 = [
            X * p1[0] + Y * p2[0] + p4[0],
            X * p1[1] + Y * p2[1] + p4[1],
            X * p1[2] + Y * p2[2] + p4[2]
        ];
        const A = [
            [p3[0], -x[0]],
            [p3[1], -x[1]],
            [p3[2], -x[2]]
        ];
        const b = [-q0[0], -q0[1], -q0[2]];
        const sol = leastSquares(A, b);
        return sol[0];
    }

    // 三维点 (X,Y,Z) 投影到图像
    function world3dToImage(H0, p3, X, Y, Z) {
        const [p1, p2, p4] = splitH0(H0);
        const xh = [
            X * p1[0] + Y * p2[0] + Z * p3[0] + p4[0],
            X * p1[1] + Y * p2[1] + Z * p3[1] + p4[1],
            X * p1[2] + Y * p2[2] + Z * p3[2] + p4[2]
        ];
        const inv = 1.0 / xh[2];
        return [xh[0] * inv, xh[1] * inv];
    }

    // =================================================================
    // 主标定函数
    // =================================================================
    function calibrateCamera() {
        try {
            document.getElementById('calibStatus').innerHTML = '';
            document.getElementById('cameraMatrixDisplay').innerHTML = '计算中...';

            // 1. 读取底座参数
            const baseRadius = parseFloat(document.getElementById('baseRadius').value);
            if (isNaN(baseRadius) || baseRadius <= 0) throw new Error("底座距离必须为正数");
            const a = baseRadius / Math.sqrt(2);
            const worldMap = {
                B1: [ a,  a], B2: [-a,  a], B3: [-a, -a], B4: [ a, -a], C: [0, 0]
            };
            const imgPoints = {
                B1: [parseFloat(document.getElementById('b1u').value), parseFloat(document.getElementById('b1v').value)],
                B2: [parseFloat(document.getElementById('b2u').value), parseFloat(document.getElementById('b2v').value)],
                B3: [parseFloat(document.getElementById('b3u').value), parseFloat(document.getElementById('b3v').value)],
                B4: [parseFloat(document.getElementById('b4u').value), parseFloat(document.getElementById('b4v').value)],
            };
            const cu = document.getElementById('cu').value, cv = document.getElementById('cv').value;
            if (cu && cv) imgPoints.C = [parseFloat(cu), parseFloat(cv)];

            let worldPts = [], imagePts = [];
            for (let key of ['B1', 'B2', 'B3', 'B4', 'C']) {
                if (imgPoints[key]) {
                    worldPts.push(worldMap[key]);
                    imagePts.push(imgPoints[key]);
                }
            }
            if (worldPts.length < 4) throw new Error("底座至少需要4个点 (B1~B4)");

            // 2. 计算 H0
            const H0 = computeHomography(worldPts, imagePts);
            console.log("H0 =", H0);

            // 3. 垂直参考点
            const vrows = document.querySelectorAll('.vpoint-row');
            let verticalPts = [];
            vrows.forEach(row => {
                let Z = parseFloat(row.querySelector('.vz').value);
                let u = parseFloat(row.querySelector('.vu').value);
                let v = parseFloat(row.querySelector('.vv').value);
                if (!isNaN(Z) && !isNaN(u) && !isNaN(v)) verticalPts.push([Z, u, v]);
            });
            if (verticalPts.length < 2) throw new Error("至少需要2个垂直参考点");

            // 4. 估计 p3
            const p3 = estimateP3(H0, verticalPts);
            console.log("p3 =", p3);

            // 5. 小车与吊钩
            const trolleyHeight = parseFloat(document.getElementById('trolleyHeight').value);
            const trolleyPixel = [parseFloat(document.getElementById('trolleyU').value), parseFloat(document.getElementById('trolleyV').value)];
            const hookPixel = [parseFloat(document.getElementById('hookU').value), parseFloat(document.getElementById('hookV').value)];
            const trolleyRadiusInput = parseFloat(document.getElementById('trolleyRadius').value);

            if (isNaN(trolleyHeight) || isNaN(trolleyPixel[0]) || isNaN(trolleyPixel[1]) ||
                isNaN(hookPixel[0]) || isNaN(hookPixel[1])) {
                throw new Error("小车或吊钩坐标无效");
            }

            // 6. 计算小车水平位置
            const [X, Y] = imageToXYAtHeight(H0, p3, trolleyPixel, trolleyHeight);
            // 7. 估计吊钩高度
            const Z_hook = estimateHeight(H0, p3, X, Y, hookPixel);
            // 8. 重投影验证
            const hookReproj = world3dToImage(H0, p3, X, Y, Z_hook);
            const reprojError = Math.hypot(hookReproj[0] - hookPixel[0], hookReproj[1] - hookPixel[1]);
            const groundPixel = groundToImage(H0, X, Y);

            // 9. 构建 4x3 相机矩阵
            const [p1, p2, p4] = splitH0(H0);
            const Pmat = [
                [p1[0], p2[0], p3[0], p4[0]],
                [p1[1], p2[1], p3[1], p4[1]],
                [p1[2], p2[2], p3[2], p4[2]]
            ];

            // 显示矩阵
            let matrixStr = "";
            for (let i = 0; i < 3; i++) {
                matrixStr += `[ ${Pmat[i].map(v => v.toFixed(6)).join(", ")} ]\n`;
            }
            document.getElementById('cameraMatrixDisplay').innerHTML = matrixStr;

            const trolleyRadiusEst = Math.hypot(X, Y);
            document.getElementById('calibStatus').innerHTML = `
                <div class="success-info">
                    ✅ 标定成功！<br>
                    📍 地面投影点: (${groundPixel[0].toFixed(3)}, ${groundPixel[1].toFixed(3)})<br>
                    🪝 吊钩重投影误差: ${reprojError.toFixed(6)} px<br>
                    🏗️ 吊物空间点: (${X.toFixed(6)}, ${Y.toFixed(6)}, ${Z_hook.toFixed(6)})<br>
                    📏 小车半径估计: ${trolleyRadiusEst.toFixed(6)} m (输入: ${trolleyRadiusInput.toFixed(3)} m)<br>
                    📐 半径偏差: ${Math.abs(trolleyRadiusEst - trolleyRadiusInput).toFixed(6)} m
                </div>
            `;
        } catch (err) {
            console.error("标定错误:", err);
            let msg = err.message || String(err);
            if (!msg) msg = "未知错误，请检查控制台";
            document.getElementById('calibStatus').innerHTML = `<div class="error-msg">❌ 标定失败: ${msg}</div>`;
            document.getElementById('cameraMatrixDisplay').innerHTML = "计算失败";
        }
    }

    // =================================================================
    // 视频交互选取功能 (保持不变)
    // =================================================================
    let activePickMode = null;
    let pickCallback = null;
    const video = document.getElementById('mainVideo');

    function getVideoOriginalCoordinates(event) {
        const rect = video.getBoundingClientRect();
        const scaleX = video.videoWidth / rect.width;
        const scaleY = video.videoHeight / rect.height;
        let u = (event.clientX - rect.left) * scaleX;
        let v = (event.clientY - rect.top) * scaleY;
        u = Math.min(Math.max(0, u), video.videoWidth);
        v = Math.min(Math.max(0, v), video.videoHeight);
        return { u, v };
    }

    function enterPickMode(targetId, callback) {
        if (activePickMode) video.style.cursor = "default";
        activePickMode = targetId;
        video.style.cursor = "crosshair";
        document.getElementById('pickTip').innerHTML = `✏️ 正在选取: ${targetId}`;
        pickCallback = callback;
    }

    function onVideoClick(event) {
        if (!activePickMode) return;
        const { u, v } = getVideoOriginalCoordinates(event);
        if (pickCallback) pickCallback(activePickMode, u, v);
        video.style.cursor = "default";
        activePickMode = null;
        document.getElementById('pickTip').innerHTML = '✅ 坐标已选取，可继续标定';
        setTimeout(() => {
            if (!activePickMode) document.getElementById('pickTip').innerHTML = '✏️ 点击「选取」按钮，再点击视频获取坐标';
        }, 1800);
    }
    video.addEventListener('click', onVideoClick);

    function bindPickButtons() {
        const mappings = [
            { id: 'b1', uId: 'b1u', vId: 'b1v' }, { id: 'b2', uId: 'b2u', vId: 'b2v' },
            { id: 'b3', uId: 'b3u', vId: 'b3v' }, { id: 'b4', uId: 'b4u', vId: 'b4v' },
            { id: 'c', uId: 'cu', vId: 'cv' },
            { id: 'trolley', uId: 'trolleyU', vId: 'trolleyV' },
            { id: 'hook', uId: 'hookU', vId: 'hookV' }
        ];
        mappings.forEach(m => {
            const btn = document.querySelector(`button.pick-btn[data-target="${m.id}"]`);
            if (btn) {
                btn.addEventListener('click', () => {
                    enterPickMode(m.id, (mode, u, v) => {
                        document.getElementById(m.uId).value = u.toFixed(3);
                        document.getElementById(m.vId).value = v.toFixed(3);
                    });
                });
            }
        });
    }

    function handleVerticalPick(e) {
        const btn = e.currentTarget;
        const row = btn.closest('.vpoint-row');
        const idx = row.getAttribute('data-idx');
        enterPickMode(`vertical_${idx}`, (mode, u, v) => {
            row.querySelector('.vu').value = u.toFixed(3);
            row.querySelector('.vv').value = v.toFixed(3);
        });
    }

    function addVerticalPoint() {
        const container = document.getElementById('verticalPointsContainer');
        const idx = container.children.length;
        const newRow = document.createElement('div');
        newRow.className = 'vpoint-row';
        newRow.setAttribute('data-idx', idx);
        newRow.innerHTML = `
            <div class="field"><label>Z${idx+1}(m)</label><input class="vz" type="number" value="15.0"></div>
            <div class="field"><label>u</label><input class="vu" type="number" value="770"></div>
            <div class="field"><label>v</label><input class="vv" type="number" value="120"></div>
            <button class="pick-btn pick-vertical" data-idx="${idx}">选取</button>
        `;
        container.appendChild(newRow);
        newRow.querySelector('.pick-vertical').addEventListener('click', handleVerticalPick);
    }

    window.addEventListener('DOMContentLoaded', () => {
        bindPickButtons();
        document.getElementById('addVerticalPoint').addEventListener('click', addVerticalPoint);
        document.getElementById('calibrateBtn').addEventListener('click', calibrateCamera);
        video.muted = true;
        video.play().catch(e => console.log("自动播放被阻止"));
        document.querySelectorAll('.pick-vertical').forEach(btn => btn.addEventListener('click', handleVerticalPick));
        const observer = new MutationObserver(() => {
            document.querySelectorAll('.pick-vertical').forEach(btn => {
                btn.removeEventListener('click', handleVerticalPick);
                btn.addEventListener('click', handleVerticalPick);
            });
        });
        observer.observe(document.getElementById('verticalPointsContainer'), { childList: true, subtree: true });
    });
</script>
</body>
</html>
