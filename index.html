<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>塔吊智能监控标定 | 相机矩阵计算</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/numeric/1.2.6/numeric.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }

        /* 主布局 */
        .split-layout {
            display: flex;
            width: 100%;
            height: 100%;
            flex-direction: row;
        }

        /* 左侧视频区 */
        .left-video {
            flex: 1;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .left-video video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
            outline: none;
            cursor: crosshair;
        }

        .pick-tip {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            color: #ffdd99;
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 20px;
            pointer-events: none;
            font-family: monospace;
            z-index: 10;
            border-left: 3px solid #ffaa33;
        }

        /* ========= 右侧区域 ========= */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f1f5f9;
            overflow: hidden;
        }

        /* 右上输入区域（紧凑设计） */
        .calib-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
        }

        .calib-area h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 6px;
            border-left: 3px solid #3b82f6;
            padding-left: 10px;
        }

        /* 横向三列布局 */
        .horizontal-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }

        /* 每个卡片独立，等宽 */
        .param-card {
            flex: 1;
            min-width: 240px;
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px 14px;
            border: 1px solid #e2edff;
            transition: all 0.2s;
        }

        .param-card h4 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            border-left: 2px solid #3b82f6;
            padding-left: 8px;
        }

        /* 紧凑的行布局 */
        .compact-row {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 8px;
            margin-bottom: 10px;
        }

        .compact-field {
            flex: 1;
            min-width: 80px;
        }

        .compact-field label {
            display: block;
            font-size: 0.7rem;
            font-weight: 500;
            color: #475569;
            margin-bottom: 2px;
        }

        .coord-small {
            display: flex;
            gap: 6px;
        }
        .coord-small input {
            width: 70px;
        }

        input, .radius-input {
            padding: 6px 8px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 0.8rem;
            transition: 0.15s;
            width: 100%;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }

        button.pick-btn {
            background: #eef2ff;
            border: none;
            border-radius: 10px;
            padding: 6px 12px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #2563eb;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;
        }
        button.pick-btn:hover {
            background: #d9e6ff;
        }

        /* 垂直参考点组内部样式 (每个点一行，紧凑) */
        .vpoint-row {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 6px;
            margin-bottom: 8px;
            background: #ffffffcc;
            padding: 6px;
            border-radius: 12px;
        }
        .vpoint-row .field {
            flex: 1;
            min-width: 60px;
        }
        .vpoint-row input {
            padding: 5px 6px;
            font-size: 0.75rem;
        }
        .add-point-btn {
            background: #eef2ff;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            padding: 5px 10px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
            text-align: center;
        }

        button.calc-btn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 28px;
            padding: 10px 16px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
            margin: 8px 0 12px 0;
            transition: 0.2s;
        }
        button.calc-btn:hover {
            background: #2563eb;
        }

        .matrix-output {
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 16px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            overflow-x: auto;
            margin-top: 12px;
        }
        .matrix-output pre {
            white-space: pre-wrap;
            word-break: break-all;
            margin: 0;
        }
        .error-msg {
            color: #dc2626;
            background: #fee2e2;
            padding: 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin: 8px 0;
        }
        .success-info {
            color: #16a34a;
            background: #e0f2e9;
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
        }

        /* 右下绘图预留区 */
        .draw-area {
            flex: 1;
            background: #fefcf5;
            border-top: 2px dashed #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .draw-area::before {
            content: "📐 绘图区 (预留)";
            font-weight: 500;
            opacity: 0.7;
        }

        /* 滚动条 */
        .calib-area::-webkit-scrollbar {
            width: 4px;
        }
        .calib-area::-webkit-scrollbar-track {
            background: #e2e8f0;
        }
        .calib-area::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 4px;
        }

        @media (max-width: 900px) {
            .horizontal-cards {
                flex-direction: column;
            }
            .coord-small input { width: 60px; }
            .compact-row { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
<div class="split-layout">
    <!-- 左侧视频区 -->
    <div class="left-video">
        <video id="mainVideo" controls preload="auto" playsinline crossorigin="anonymous">
            <source src="./Crane_working_1.mp4" type="video/mp4">
            浏览器不支持视频播放。
        </video>
        <div class="pick-tip" id="pickTip">✏️ 点击「选取」按钮，再点击视频获取坐标</div>
    </div>

    <!-- 右侧区域 -->
    <div class="right-panel">
        <div class="calib-area">
            <h3>📐 相机标定 & 4x3 投影矩阵</h3>

            <!-- 三个主要区域横向排列 -->
            <div class="horizontal-cards">
                <!-- 卡片1: 塔吊底座参数 -->
                <div class="param-card">
                    <h4>🏗️ 塔吊底座参数</h4>
                    <div class="compact-row">
                        <div class="compact-field">
                            <label>中心到底座角点距离 (米)</label>
                            <input type="number" id="baseRadius" value="2.0" step="0.1">
                        </div>
                    </div>
                    <div style="margin: 8px 0 4px 0;"><label style="font-size:0.7rem;">📍 底座图像角点</label></div>
                    <!-- B1 -->
                    <div class="compact-row">
                        <div class="compact-field"><label>B1 (u,v)</label><div class="coord-small"><input id="b1u" placeholder="u" value="705.720"><input id="b1v" placeholder="v" value="403.008"></div></div>
                        <button class="pick-btn" data-target="b1">选取</button>
                    </div>
                    <!-- B2 -->
                    <div class="compact-row">
                        <div class="compact-field"><label>B2 (u,v)</label><div class="coord-small"><input id="b2u" placeholder="u" value="596.730"><input id="b2v" placeholder="v" value="391.163"></div></div>
                        <button class="pick-btn" data-target="b2">选取</button>
                    </div>
                    <!-- B3 -->
                    <div class="compact-row">
                        <div class="compact-field"><label>B3 (u,v)</label><div class="coord-small"><input id="b3u" placeholder="u" value="573.343"><input id="b3v" placeholder="v" value="437.234"></div></div>
                        <button class="pick-btn" data-target="b3">选取</button>
                    </div>
                    <!-- B4 -->
                    <div class="compact-row">
                        <div class="compact-field"><label>B4 (u,v)</label><div class="coord-small"><input id="b4u" placeholder="u" value="683.393"><input id="b4v" placeholder="v" value="448.919"></div></div>
                        <button class="pick-btn" data-target="b4">选取</button>
                    </div>
                    <!-- 中心点C -->
                    <div class="compact-row">
                        <div class="compact-field"><label>C 中心 (可选)</label><div class="coord-small"><input id="cu" placeholder="u" value=""><input id="cv" placeholder="v" value=""></div></div>
                        <button class="pick-btn" data-target="c">选取</button>
                    </div>
                </div>

                <!-- 卡片2: 塔身垂直参考点 -->
                <div class="param-card">
                    <h4>📏 塔身垂直参考点 (Z, u, v)</h4>
                    <div id="verticalPointsContainer">
                        <div class="vpoint-row" data-idx="0">
                            <div class="field"><label>Z1(m)</label><input class="vz" type="number" value="10.0" step="0.5"></div>
                            <div class="field"><label>u</label><input class="vu" type="number" value="727.273"></div>
                            <div class="field"><label>v</label><input class="vv" type="number" value="222.222"></div>
                            <button class="pick-btn pick-vertical" data-idx="0">选取</button>
                        </div>
                        <div class="vpoint-row" data-idx="1">
                            <div class="field"><label>Z2(m)</label><input class="vz" type="number" value="20.0" step="0.5"></div>
                            <div class="field"><label>u</label><input class="vu" type="number" value="816.327"></div>
                            <div class="field"><label>v</label><input class="vv" type="number" value="20.408"></div>
                            <button class="pick-btn pick-vertical" data-idx="1">选取</button>
                        </div>
                    </div>
                    <button id="addVerticalPoint" class="add-point-btn">+ 添加参考点</button>
                </div>

                <!-- 卡片3: 小车与吊钩关键点 -->
                <div class="param-card">
                    <h4>🚛 小车与吊钩关键点</h4>
                    <div class="compact-row">
                        <div class="compact-field"><label>小车高度 (米)</label><input id="trolleyHeight" type="number" value="10.0" step="0.5"></div>
                    </div>
                    <div class="compact-row">
                        <div class="compact-field"><label>小车像素 (u,v)</label><div class="coord-small"><input id="trolleyU" value="1074.219"><input id="trolleyV" value="166.016"></div></div>
                        <button class="pick-btn" data-target="trolley">选取</button>
                    </div>
                    <div class="compact-row">
                        <div class="compact-field"><label>吊钩像素 (u,v)</label><div class="coord-small"><input id="hookU" value="1038.911"><input id="hookV" value="243.191"></div></div>
                        <button class="pick-btn" data-target="hook">选取</button>
                    </div>
                    <div class="compact-row">
                        <div class="compact-field"><label>小车半径 (米) 可选校验</label><input id="trolleyRadius" type="number" value="10.0" step="0.5"></div>
                    </div>
                </div>
            </div>

            <button id="calibrateBtn" class="calc-btn">🔧 计算相机矩阵 (4x3 投影矩阵)</button>

            <!-- 结果显示 -->
            <div id="resultPanel">
                <div class="matrix-output">
                    <strong>📷 4×3 相机投影矩阵 P</strong>
                    <pre id="cameraMatrixDisplay">尚未计算</pre>
                </div>
                <div id="calibStatus"></div>
            </div>
        </div>

        <!-- 右下预留绘图区 -->
        <div class="draw-area"></div>
    </div>
</div>

<script>
    // ---------- 全局变量 ----------
    let activePickMode = null;
    let pickCallback = null;
    const video = document.getElementById('mainVideo');

    function getVideoOriginalCoordinates(event) {
        const rect = video.getBoundingClientRect();
        const scaleX = video.videoWidth / rect.width;
        const scaleY = video.videoHeight / rect.height;
        let u = (event.clientX - rect.left) * scaleX;
        let v = (event.clientY - rect.top) * scaleY;
        u = Math.min(Math.max(0, u), video.videoWidth);
        v = Math.min(Math.max(0, v), video.videoHeight);
        return { u, v };
    }

    function enterPickMode(targetId, callback) {
        if (activePickMode) video.style.cursor = "default";
        activePickMode = targetId;
        video.style.cursor = "crosshair";
        document.getElementById('pickTip').innerHTML = `✏️ 正在选取: ${targetId}`;
        pickCallback = callback;
    }

    function onVideoClick(event) {
        if (!activePickMode) return;
        const { u, v } = getVideoOriginalCoordinates(event);
        if (pickCallback) pickCallback(activePickMode, u, v);
        video.style.cursor = "default";
        activePickMode = null;
        document.getElementById('pickTip').innerHTML = '✅ 坐标已选取，可继续标定';
        setTimeout(() => {
            if(!activePickMode) document.getElementById('pickTip').innerHTML = '✏️ 点击「选取」按钮，再点击视频获取坐标';
        }, 1800);
    }
    video.addEventListener('click', onVideoClick);

    // 绑定选取按钮（底座、小车、吊钩）
    function bindPickButtons() {
        const mappings = [
            { id:'b1', uId:'b1u', vId:'b1v' }, { id:'b2', uId:'b2u', vId:'b2v' },
            { id:'b3', uId:'b3u', vId:'b3v' }, { id:'b4', uId:'b4u', vId:'b4v' },
            { id:'c', uId:'cu', vId:'cv' },
            { id:'trolley', uId:'trolleyU', vId:'trolleyV' },
            { id:'hook', uId:'hookU', vId:'hookV' }
        ];
        mappings.forEach(m => {
            const btn = document.querySelector(`button.pick-btn[data-target="${m.id}"]`);
            if(btn) {
                btn.addEventListener('click', () => {
                    enterPickMode(m.id, (mode, u, v) => {
                        document.getElementById(m.uId).value = u.toFixed(3);
                        document.getElementById(m.vId).value = v.toFixed(3);
                    });
                });
            }
        });
    }

    function handleVerticalPick(e) {
        const btn = e.currentTarget;
        const row = btn.closest('.vpoint-row');
        const idx = row.getAttribute('data-idx');
        enterPickMode(`vertical_${idx}`, (mode, u, v) => {
            const vu = row.querySelector('.vu');
            const vv = row.querySelector('.vv');
            if(vu) vu.value = u.toFixed(3);
            if(vv) vv.value = v.toFixed(3);
        });
    }

    function addVerticalPoint() {
        const container = document.getElementById('verticalPointsContainer');
        const idx = container.children.length;
        const newRow = document.createElement('div');
        newRow.className = 'vpoint-row';
        newRow.setAttribute('data-idx', idx);
        newRow.innerHTML = `
            <div class="field"><label>Z${idx+1}(m)</label><input class="vz" type="number" value="15.0" step="0.5"></div>
            <div class="field"><label>u</label><input class="vu" type="number" value="770"></div>
            <div class="field"><label>v</label><input class="vv" type="number" value="120"></div>
            <button class="pick-btn pick-vertical" data-idx="${idx}">选取</button>
        `;
        container.appendChild(newRow);
        const newBtn = newRow.querySelector('.pick-vertical');
        newBtn.addEventListener('click', handleVerticalPick);
    }

    // ---------- 核心计算函数 ----------
    function normalizePoints2D(points) {
        let n = points.length;
        let meanX = 0, meanY = 0;
        for(let p of points) { meanX += p[0]; meanY += p[1]; }
        meanX /= n; meanY /= n;
        let centered = points.map(p => [p[0]-meanX, p[1]-meanY]);
        let sumDist = 0;
        for(let c of centered) sumDist += Math.hypot(c[0], c[1]);
        let meanDist = sumDist / n;
        let scale = Math.sqrt(2) / meanDist;
        let T = [[scale, 0, -scale*meanX], [0, scale, -scale*meanY], [0,0,1]];
        let normPoints = [];
        for(let p of points) {
            let ph = [p[0], p[1], 1];
            let res = numeric.dot(T, ph);
            normPoints.push([res[0]/res[2], res[1]/res[2]]);
        }
        return { normPoints, T };
    }

    function computeHomography(worldPts, imagePts) {
        if(worldPts.length < 4) throw new Error("至少需要4对点");
        let { normPoints: worldNorm, T: Tw } = normalizePoints2D(worldPts);
        let { normPoints: imgNorm, T: Ti } = normalizePoints2D(imagePts);
        let A = [];
        for(let i=0; i<worldNorm.length; i++) {
            let [X,Y] = worldNorm[i];
            let [u,v] = imgNorm[i];
            A.push([X, Y, 1, 0, 0, 0, -u*X, -u*Y, -u]);
            A.push([0, 0, 0, X, Y, 1, -v*X, -v*Y, -v]);
        }
        let svd = numeric.svd(A);
        let V = svd.V;
        let h = V[V.length-1];
        let Hn = [[h[0],h[1],h[2]],[h[3],h[4],h[5]],[h[6],h[7],h[8]]];
        let TiInv = numeric.inv(Ti);
        let H = numeric.dot(numeric.dot(TiInv, Hn), Tw);
        let scale = H[2][2];
        if(Math.abs(scale)>1e-9) for(let i=0;i<3;i++) for(let j=0;j<3;j++) H[i][j]/=scale;
        return H;
    }

    function estimateP3FromVerticalPoints(H0, verticalPoints) {
        let p4 = [H0[0][2], H0[1][2], H0[2][2]];
        let usable = [];
        for(let vp of verticalPoints) {
            let Z = vp[0];
            if(Math.abs(Z) < 1e-6) continue;
            let u = vp[1], vv = vp[2];
            usable.push({Z, x: [u, vv, 1.0]});
        }
        if(usable.length < 2) throw new Error("至少需要2个有效垂直参考点");
        let n = usable.length;
        let A = [], b = [];
        for(let i=0; i<n; i++) {
            let Z = usable[i].Z;
            let x = usable[i].x;
            let row1 = [Z, 0, 0, -x[0], 0, 0];
            let row2 = [0, Z, 0, -x[1], 0, 0];
            let row3 = [0, 0, Z, -x[2], 0, 0];
            for(let r=0;r<3;r++) {
                let row = [0,0,0,0,0,0];
                if(r===0) row = [Z,0,0, -x[0],0,0];
                else if(r===1) row = [0,Z,0, -x[1],0,0];
                else row = [0,0,Z, -x[2],0,0];
                A.push(row.slice(0,6));
                b.push(-p4[r]);
            }
        }
        let svdA = numeric.svd(A);
        let sol = numeric.solve(A, b, true);
        let p3 = [sol[0], sol[1], sol[2]];
        return {p3, rank: svdA.S.filter(s=>s>1e-8).length, residualNorm: numeric.norm2(numeric.sub(numeric.dot(A,sol),b)) };
    }

    function buildCameraMatrix(H0, p3) {
        let p1 = [H0[0][0], H0[1][0], H0[2][0]];
        let p2 = [H0[0][1], H0[1][1], H0[2][1]];
        let p4 = [H0[0][2], H0[1][2], H0[2][2]];
        let P = [
            [p1[0], p2[0], p3[0], p4[0]],
            [p1[1], p2[1], p3[1], p4[1]],
            [p1[2], p2[2], p3[2], p4[2]]
        ];
        return P;
    }

    function calibrateCamera() {
        try {
            const baseRadius = parseFloat(document.getElementById('baseRadius').value);
            const a = baseRadius / Math.sqrt(2);
            const worldMap = {
                B1: [ a,  a], B2: [-a,  a], B3: [-a, -a], B4: [ a, -a], C: [0,0]
            };
            const imgPoints = {
                B1: [parseFloat(document.getElementById('b1u').value), parseFloat(document.getElementById('b1v').value)],
                B2: [parseFloat(document.getElementById('b2u').value), parseFloat(document.getElementById('b2v').value)],
                B3: [parseFloat(document.getElementById('b3u').value), parseFloat(document.getElementById('b3v').value)],
                B4: [parseFloat(document.getElementById('b4u').value), parseFloat(document.getElementById('b4v').value)],
            };
            const cu = document.getElementById('cu').value, cv = document.getElementById('cv').value;
            if(cu && cv) imgPoints.C = [parseFloat(cu), parseFloat(cv)];

            let worldPoints = [], imagePoints = [];
            for(let key of ['B1','B2','B3','B4','C']) {
                if(imgPoints[key]) {
                    worldPoints.push(worldMap[key]);
                    imagePoints.push(imgPoints[key]);
                }
            }
            if(worldPoints.length < 4) throw new Error("底座至少需要4个点 (B1~B4)");
            const H0 = computeHomography(worldPoints, imagePoints);

            const vrows = document.querySelectorAll('.vpoint-row');
            let verticalPts = [];
            vrows.forEach(row => {
                let Z = parseFloat(row.querySelector('.vz').value);
                let u = parseFloat(row.querySelector('.vu').value);
                let v = parseFloat(row.querySelector('.vv').value);
                if(!isNaN(Z) && !isNaN(u) && !isNaN(v)) verticalPts.push([Z, u, v]);
            });
            if(verticalPts.length < 2) throw new Error("至少需要2个垂直参考点");
            const {p3} = estimateP3FromVerticalPoints(H0, verticalPts);
            const Pmat = buildCameraMatrix(H0, p3);
            let matrixStr = "";
            for(let i=0;i<3;i++) {
                matrixStr += `[ ${Pmat[i].map(v=>v.toFixed(6)).join(", ")} ]\n`;
            }
            document.getElementById('cameraMatrixDisplay').innerHTML = matrixStr;
            document.getElementById('calibStatus').innerHTML = `<div class="success-info">✅ 标定成功！4×3相机矩阵已生成。</div>`;
            window.lastCameraMatrix = Pmat;
            return Pmat;
        } catch(err) {
            console.error(err);
            document.getElementById('calibStatus').innerHTML = `<div class="error-msg">❌ 标定失败: ${err.message}</div>`;
            document.getElementById('cameraMatrixDisplay').innerHTML = "计算失败";
            return null;
        }
    }

    // 初始化
    window.addEventListener('DOMContentLoaded', () => {
        bindPickButtons();
        document.getElementById('addVerticalPoint').addEventListener('click', addVerticalPoint);
        document.getElementById('calibrateBtn').addEventListener('click', calibrateCamera);
        video.muted = true;
        video.play().catch(e=>console.log("自动播放被阻止"));
        // 动态绑定垂直参考点按钮
        const observer = new MutationObserver(() => {
            document.querySelectorAll('.pick-vertical').forEach(btn => {
                btn.removeEventListener('click', handleVerticalPick);
                btn.addEventListener('click', handleVerticalPick);
            });
        });
        observer.observe(document.getElementById('verticalPointsContainer'), { childList: true, subtree: true });
        document.querySelectorAll('.pick-vertical').forEach(btn => btn.addEventListener('click', handleVerticalPick));
    });
</script>
</body>
</html>
